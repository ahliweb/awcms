asyncapi: 3.0.0
info:
  title: AWCMS Domain Events
  version: 0.1.0
  description: |-
    Domain event contract for AWCMS. The `domain_event_runtime` module ships
    exactly one self-contained reference event
    (`awcms.domain-event-runtime.sample.recorded`) that exercises the
    transactional outbox, dispatcher, ordering, retry/backoff, dead-letter,
    and replay mechanism end-to-end. Real producer modules add their OWN
    channels here (and their own `ModuleDescriptor.events.publishes` entries)
    when they start calling `appendDomainEvent`
    (docs/awcms/10_template_kode_coding_standard.md §Domain event envelope).
channels:
  awcms.domain-event-runtime.sample.recorded:
    address: awcms.domain-event-runtime.sample.recorded
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      Reference/example event used to exercise the domain-event-runtime
      outbox, dispatcher, ordering, retry/backoff, dead-letter, and replay
      mechanism end-to-end. Real producer modules publish their OWN event
      types the same way, via `appendDomainEvent` — this one is intentionally
      self-contained rather than tied to another module's business logic in
      this foundation module (see
      `src/modules/domain-event-runtime/domain/event-type-registry.ts`'s own
      doc comment). Producer: any caller of
      `application/append-domain-event.ts`'s `appendDomainEvent` for this
      event type; consumers:
      `infrastructure/consumer-registry.ts`'s two reference consumers
      (a same-process cross-module audit projector and a self-contained
      read-model activity-rollup projection).
  awcms.workflow.instance.started:
    address: awcms.workflow.instance.started
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A workflow instance was started, pinned to the currently-active
      workflow definition version. Producer:
      `workflow-approval/application/workflow-instance.ts`'s
      `startWorkflowInstance`, via `appendDomainEvent` in the same
      transaction as the instance's creation.
  awcms.workflow.instance.advanced:
    address: awcms.workflow.instance.advanced
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A workflow instance's active task was decided (or force-decided) and
      the instance advanced to its next node(s), without yet reaching a
      terminal outcome. Producer:
      `workflow-approval/application/workflow-instance-decision.ts`'s
      `completeApprovalTaskAndAdvance`.
  awcms.workflow.instance.approved:
    address: awcms.workflow.instance.approved
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A workflow instance reached an `end` node with outcome `approved`.
      Producer: `workflow-approval/application/workflow-instance.ts` /
      `workflow-instance-decision.ts`.
  awcms.workflow.instance.rejected:
    address: awcms.workflow.instance.rejected
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A workflow instance reached an `end` node with outcome `rejected`, or
      was force-rejected. Producer:
      `workflow-approval/application/workflow-instance.ts` /
      `workflow-instance-decision.ts`.
  awcms.workflow.instance.cancelled:
    address: awcms.workflow.instance.cancelled
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      An administrator cancelled a running workflow instance. Producer:
      `workflow-approval/application/workflow-recovery.ts`'s
      `cancelWorkflowInstance`, via
      `POST /api/v1/workflows/instances/{id}/cancel`.
  awcms.workflow.task.escalated:
    address: awcms.workflow.task.escalated
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A pending workflow task passed its due date and was escalated by the
      scheduled escalation/timeout job. Producer:
      `workflow-approval/application/workflow-escalation.ts`'s
      `escalateDueTasksForTenant`, run via
      `bun run workflow:escalations:dispatch`.
  awcms.workflow.delegation.created:
    address: awcms.workflow.delegation.created
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A workflow delegation/substitute assignment was created. Producer:
      `workflow-approval/application/workflow-delegation-directory.ts`'s
      `createWorkflowDelegation`.
  awcms.workflow.delegation.revoked:
    address: awcms.workflow.delegation.revoked
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A workflow delegation/substitute assignment was revoked. Producer:
      `workflow-approval/application/workflow-delegation-directory.ts`'s
      `revokeWorkflowDelegation`.
  awcms.email.message.queued:
    address: awcms.email.message.queued
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      An email message was enqueued into `awcms_email_messages`. Documented
      contract only, same convention as `database.pool.saturated` — the
      concrete producer is the structured JSON logger, invoked from
      `email/application/announcement-directory.ts`'s `enqueueAnnouncement`
      (`email.message.queued` log line).
  awcms.email.message.sent:
    address: awcms.email.message.sent
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      The email dispatcher (`bun run email:dispatch`) delivered a message
      through the configured provider. Documented contract only; producer is
      the structured JSON logger (`email/application/email-dispatch.ts`'s
      `email.dispatch.sent` log line).
  awcms.email.message.failed:
    address: awcms.email.message.failed
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      The email dispatcher exhausted retries (or hit a non-retryable failure)
      for a queued message. Documented contract only; producer is the
      structured JSON logger (`email/application/email-dispatch.ts`'s
      `email.dispatch.failed` log line).
  awcms.email.message.suppressed:
    address: awcms.email.message.suppressed
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      The email dispatcher found a claimed message's recipient newly present
      on `awcms_email_suppression_list` (added after enqueue, before dispatch)
      and skipped the provider call entirely. Documented contract only;
      producer is the structured JSON logger
      (`email/application/email-dispatch.ts`'s `email.dispatch.suppressed`
      log line).
  awcms.email.message.cancelled:
    address: awcms.email.message.cancelled
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      An operator cancelled a still-queued message
      (`POST /api/v1/email/messages/{id}/cancel`) before dispatch. Documented
      contract only; producer is the structured JSON logger
      (`pages/api/v1/email/messages/[id]/cancel.ts`'s `email.message.cancelled`
      log line).
operations:
  publishDomainEventRuntimeSampleRecorded:
    action: send
    channel:
      $ref: "#/channels/awcms.domain-event-runtime.sample.recorded"
    messages:
      - $ref: "#/channels/awcms.domain-event-runtime.sample.recorded/messages/DomainEvent"
  subscribeDomainEventRuntimeSampleRecorded:
    action: receive
    channel:
      $ref: "#/channels/awcms.domain-event-runtime.sample.recorded"
    messages:
      - $ref: "#/channels/awcms.domain-event-runtime.sample.recorded/messages/DomainEvent"
  publishWorkflowInstanceStarted:
    action: send
    channel:
      $ref: "#/channels/awcms.workflow.instance.started"
    messages:
      - $ref: "#/channels/awcms.workflow.instance.started/messages/DomainEvent"
  publishWorkflowInstanceAdvanced:
    action: send
    channel:
      $ref: "#/channels/awcms.workflow.instance.advanced"
    messages:
      - $ref: "#/channels/awcms.workflow.instance.advanced/messages/DomainEvent"
  publishWorkflowInstanceApproved:
    action: send
    channel:
      $ref: "#/channels/awcms.workflow.instance.approved"
    messages:
      - $ref: "#/channels/awcms.workflow.instance.approved/messages/DomainEvent"
  publishWorkflowInstanceRejected:
    action: send
    channel:
      $ref: "#/channels/awcms.workflow.instance.rejected"
    messages:
      - $ref: "#/channels/awcms.workflow.instance.rejected/messages/DomainEvent"
  publishWorkflowInstanceCancelled:
    action: send
    channel:
      $ref: "#/channels/awcms.workflow.instance.cancelled"
    messages:
      - $ref: "#/channels/awcms.workflow.instance.cancelled/messages/DomainEvent"
  publishWorkflowTaskEscalated:
    action: send
    channel:
      $ref: "#/channels/awcms.workflow.task.escalated"
    messages:
      - $ref: "#/channels/awcms.workflow.task.escalated/messages/DomainEvent"
  publishWorkflowDelegationCreated:
    action: send
    channel:
      $ref: "#/channels/awcms.workflow.delegation.created"
    messages:
      - $ref: "#/channels/awcms.workflow.delegation.created/messages/DomainEvent"
  publishWorkflowDelegationRevoked:
    action: send
    channel:
      $ref: "#/channels/awcms.workflow.delegation.revoked"
    messages:
      - $ref: "#/channels/awcms.workflow.delegation.revoked/messages/DomainEvent"
  publishEmailMessageQueued:
    action: send
    channel:
      $ref: "#/channels/awcms.email.message.queued"
    messages:
      - $ref: "#/channels/awcms.email.message.queued/messages/DomainEvent"
  publishEmailMessageSent:
    action: send
    channel:
      $ref: "#/channels/awcms.email.message.sent"
    messages:
      - $ref: "#/channels/awcms.email.message.sent/messages/DomainEvent"
  publishEmailMessageFailed:
    action: send
    channel:
      $ref: "#/channels/awcms.email.message.failed"
    messages:
      - $ref: "#/channels/awcms.email.message.failed/messages/DomainEvent"
  publishEmailMessageSuppressed:
    action: send
    channel:
      $ref: "#/channels/awcms.email.message.suppressed"
    messages:
      - $ref: "#/channels/awcms.email.message.suppressed/messages/DomainEvent"
  publishEmailMessageCancelled:
    action: send
    channel:
      $ref: "#/channels/awcms.email.message.cancelled"
    messages:
      - $ref: "#/channels/awcms.email.message.cancelled/messages/DomainEvent"
components:
  messages:
    DomainEvent:
      name: DomainEvent
      title: Domain event envelope
      contentType: application/json
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
  schemas:
    DomainEventEnvelope:
      type: object
      required:
        [
          eventId,
          eventType,
          eventVersion,
          tenantId,
          aggregateType,
          aggregateId,
          occurredAt,
          payload,
          metadata
        ]
      properties:
        eventId: { type: string, format: uuid }
        eventType: { type: string }
        eventVersion: { type: string }
        tenantId: { type: string, format: uuid }
        nodeId: { type: string, format: uuid }
        aggregateType: { type: string }
        aggregateId: { type: string }
        occurredAt: { type: string, format: date-time }
        actor:
          type: object
          properties:
            tenantUserId: { type: string, format: uuid }
            profileId: { type: string, format: uuid }
        correlationId: { type: string }
        causationId: { type: string }
        payload: {}
        metadata:
          type: object
          required: [sourceModule, schemaVersion]
          properties:
            sourceModule: { type: string }
            schemaVersion: { type: string }
