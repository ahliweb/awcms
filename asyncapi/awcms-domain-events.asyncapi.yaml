asyncapi: 3.0.0
info:
  title: AWCMS Domain Events
  version: 0.1.0
  description: |-
    Domain event contract for AWCMS. The `domain_event_runtime` module ships
    exactly one self-contained reference event
    (`awcms.domain-event-runtime.sample.recorded`) that exercises the
    transactional outbox, dispatcher, ordering, retry/backoff, dead-letter,
    and replay mechanism end-to-end. Real producer modules add their OWN
    channels here (and their own `ModuleDescriptor.events.publishes` entries)
    when they start calling `appendDomainEvent`
    (docs/awcms/10_template_kode_coding_standard.md §Domain event envelope).
channels:
  awcms.domain-event-runtime.sample.recorded:
    address: awcms.domain-event-runtime.sample.recorded
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      Reference/example event used to exercise the domain-event-runtime
      outbox, dispatcher, ordering, retry/backoff, dead-letter, and replay
      mechanism end-to-end. Real producer modules publish their OWN event
      types the same way, via `appendDomainEvent` — this one is intentionally
      self-contained rather than tied to another module's business logic in
      this foundation module (see
      `src/modules/domain-event-runtime/domain/event-type-registry.ts`'s own
      doc comment). Producer: any caller of
      `application/append-domain-event.ts`'s `appendDomainEvent` for this
      event type; consumers:
      `infrastructure/consumer-registry.ts`'s two reference consumers
      (a same-process cross-module audit projector and a self-contained
      read-model activity-rollup projection).
operations:
  publishDomainEventRuntimeSampleRecorded:
    action: send
    channel:
      $ref: "#/channels/awcms.domain-event-runtime.sample.recorded"
    messages:
      - $ref: "#/channels/awcms.domain-event-runtime.sample.recorded/messages/DomainEvent"
  subscribeDomainEventRuntimeSampleRecorded:
    action: receive
    channel:
      $ref: "#/channels/awcms.domain-event-runtime.sample.recorded"
    messages:
      - $ref: "#/channels/awcms.domain-event-runtime.sample.recorded/messages/DomainEvent"
components:
  messages:
    DomainEvent:
      name: DomainEvent
      title: Domain event envelope
      contentType: application/json
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
  schemas:
    DomainEventEnvelope:
      type: object
      required:
        [
          eventId,
          eventType,
          eventVersion,
          tenantId,
          aggregateType,
          aggregateId,
          occurredAt,
          payload,
          metadata
        ]
      properties:
        eventId: { type: string, format: uuid }
        eventType: { type: string }
        eventVersion: { type: string }
        tenantId: { type: string, format: uuid }
        nodeId: { type: string, format: uuid }
        aggregateType: { type: string }
        aggregateId: { type: string }
        occurredAt: { type: string, format: date-time }
        actor:
          type: object
          properties:
            tenantUserId: { type: string, format: uuid }
            profileId: { type: string, format: uuid }
        correlationId: { type: string }
        causationId: { type: string }
        payload: {}
        metadata:
          type: object
          required: [sourceModule, schemaVersion]
          properties:
            sourceModule: { type: string }
            schemaVersion: { type: string }
