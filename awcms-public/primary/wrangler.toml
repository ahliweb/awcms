name = "awcms-public"
compatibility_date = "2026-03-08"
compatibility_flags = ["nodejs_compat", "disable_nodejs_process_v2"]
pages_build_output_dir = "dist"

kv_namespaces = [
  { binding = "SESSION", id = "78cc94b763664d56b5ac9d34f1244304", preview_id = "e8ef4970b795432bafdb048233850182" }
]

[assets]
binding = "CF_PAGES_ASSETS"
directory = "dist"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "awcms-media"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Secrets and bindings (manage via Cloudflare Dashboard or wrangler pages project config)
# - PUBLIC_SUPABASE_URL
# - PUBLIC_SUPABASE_PUBLISHABLE_KEY
# - SESSION KV binding when Cloudflare session storage is enabled
