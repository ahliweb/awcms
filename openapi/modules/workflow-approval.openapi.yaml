# Source fragment for the "workflow-approval" module (Issue #182, epic #177).
#
# Owns every path whose operations carry this module's OpenAPI tag(s), plus
# every components.schemas entry referenced ONLY by this module's operations.
# Schemas shared by 2+ modules (or referenced by none) live in the root
# fragment (openapi/awcms-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI: $ref targets pointing at shared components
# (securitySchemes/parameters/responses and cross-module schemas) only resolve
# after `bun run openapi:bundle` merges this file with the root fragment and
# every sibling module fragment into openapi/awcms-public-api.openapi.yaml.
# Edit this file (or the root fragment for shared components), never the
# generated bundle.
paths:
  /api/v1/workflows/definitions:
    get:
      tags:
        - Workflow Approval
      operationId: workflowsListDefinitions
      summary: List workflow definitions (latest version per workflow key).
      description: One row per distinct workflowKey (latest version, or latest matching the lifecycleStatus filter). See GET /definitions/{id} for full version history.
      parameters:
        - name: lifecycleStatus
          in: query
          schema:
            type: string
            enum:
              - draft
              - active
              - retired
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Latest version per distinct workflow key.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Workflow Approval
      operationId: workflowsCreateDefinition
      summary: Create a new draft workflow definition.
      description: Creates a draft version 1 (or the next draft version if the workflowKey already has history). Guarded by workflow.definition.create.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workflowKey
                - name
                - graph
              properties:
                workflowKey:
                  type: string
                name:
                  type: string
                description:
                  type: string
                graph:
                  type: object
                factsSchema:
                  type: array
                  items:
                    type: object
      responses:
        "200":
          description: Draft definition created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/workflows/definitions/{id}:
    get:
      tags:
        - Workflow Approval
      operationId: workflowsGetDefinition
      summary: Get a workflow definition and its full version history.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Definition detail plus every version of the same workflow key.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Workflow Approval
      operationId: workflowsUpdateDefinition
      summary: Update a draft workflow definition in place.
      description: 409 if the definition is not a draft (fork a new version via POST /new-version instead).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                graph:
                  type: object
                factsSchema:
                  type: array
                  items:
                    type: object
      responses:
        "200":
          description: Draft definition updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The definition is not a draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
        - Workflow Approval
      operationId: workflowsDeleteDefinition
      summary: Soft-delete a draft workflow definition (idempotent, audited).
      description: High-risk — requires Idempotency-Key. 409 for any non-draft (published/retired version history is permanent).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Draft definition soft-deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or the definition is not a draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/definitions/{id}/new-version:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsCreateDefinitionNewVersion
      summary: Fork a new draft version from an existing definition.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: New draft version created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/workflows/definitions/{id}/publish:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsPublishDefinition
      summary: Publish/activate a draft workflow definition version (idempotent, audited).
      description: Transitions draft to active, retiring any previously-active version of the same workflow key in the same transaction. High-risk — requires Idempotency-Key.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Definition published.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or the definition is not a draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/definitions/{id}/retire:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsRetireDefinition
      summary: Voluntarily retire an active workflow definition version (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Definition retired.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or the definition is not active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/definitions/{id}/validate:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsValidateDefinition
      summary: Dry-run validate a workflow definition graph (stored, or a candidate in the body).
      description: Read-only, non-persisting. Never fails the HTTP call for an invalid graph — returns the validation result in the body.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                graph: {}
                factsSchema: {}
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/workflows/delegations:
    get:
      tags:
        - Workflow Approval
      operationId: workflowsListDelegations
      summary: List workflow delegations.
      parameters:
        - name: delegatorTenantUserId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Delegations (limit 100), newest first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Workflow Approval
      operationId: workflowsCreateDelegation
      summary: Create a workflow delegation from the calling tenant user (idempotent, audited).
      description: A tenant user can only delegate their OWN standing. High-risk — requires Idempotency-Key.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - delegateTenantUserId
                - reason
              properties:
                delegateTenantUserId:
                  type: string
                  format: uuid
                workflowKey:
                  type: string
                resourceType:
                  type: string
                effectiveFrom:
                  type: string
                  format: date-time
                effectiveTo:
                  type: string
                  format: date-time
                reason:
                  type: string
      responses:
        "200":
          description: Delegation created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/delegations/{id}/revoke:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsRevokeDelegation
      summary: Revoke a workflow delegation (delegator only, idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Delegation revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/instances/{id}:
    get:
      tags:
        - Workflow Approval
      operationId: workflowsGetInstance
      summary: Get a workflow instance's detail and immutable action history.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Instance detail plus decision/audit history, newest first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/workflows/instances/{id}/cancel:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsCancelInstance
      summary: Administrative recovery — cancel a running (pending) workflow instance (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              additionalProperties: false
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Instance cancelled, along with every one of its pending tasks.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency-Key reused with a different request, or the instance is not pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/tasks:
    get:
      tags:
        - Workflow Approval
      operationId: workflowsGetPendingTasks
      summary: Consolidated approval inbox — keyset-paginated, filterable task list.
      parameters:
        - name: workflowKey
          in: query
          schema:
            type: string
        - name: resourceType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - pending
              - completed
              - skipped
              - cancelled
        - name: overdue
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Tasks matching the filters (limit 100) with an opaque nextCursor for the next page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/workflows/tasks/{id}/decisions:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsRecordTaskDecision
      summary: Record a decision (approve/reject) for a pending workflow task (idempotent, audited).
      description: The task completes only once its quorum rule is satisfied; the instance advances through the graph only once the task completes. High-risk — requires Idempotency-Key.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - decision
              properties:
                decision:
                  type: string
                  enum:
                    - approve
                    - reject
                reason:
                  type: string
      responses:
        "200":
          description: Decision recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Access denied by RBAC/ABAC/self-approval, or the caller is not an eligible decider for this task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or the task's decision has already been recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/tasks/{id}/force-decision:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsForceTaskDecision
      summary: Administrative recovery — force-approve/force-reject a pending task, bypassing quorum (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - decision
                - reason
              properties:
                decision:
                  type: string
                  enum:
                    - approve
                    - reject
                reason:
                  type: string
      responses:
        "200":
          description: Task force-decided and the instance advanced accordingly.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or the task is not pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/tasks/{id}/reassign:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsReassignTask
      summary: Administrative recovery — reassign a pending task to another tenant user (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - toTenantUserId
                - reason
              properties:
                toTenantUserId:
                  type: string
                  format: uuid
                reason:
                  type: string
      responses:
        "200":
          description: Task reassigned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, the task is not pending, or the target has already decided this task (reassigning to them would let one person's authority count twice toward quorum).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
