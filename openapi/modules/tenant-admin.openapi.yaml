# Source fragment for the "tenant-admin" module (Issue #182, epic #177).
#
# Owns every path whose operations carry this module's OpenAPI tag(s), plus
# every components.schemas entry referenced ONLY by this module's operations.
# Schemas shared by 2+ modules (or referenced by none) live in the root
# fragment (openapi/awcms-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI: $ref targets pointing at shared components
# (securitySchemes/parameters/responses and cross-module schemas) only resolve
# after `bun run openapi:bundle` merges this file with the root fragment and
# every sibling module fragment into openapi/awcms-public-api.openapi.yaml.
# Edit this file (or the root fragment for shared components), never the
# generated bundle.
paths:
  /api/v1/offices:
    get:
      operationId: listOffices
      tags:
        - Tenant Admin
      summary: List offices for the current tenant — keyset-paginated, newest first.
      parameters:
        - name: cursor
          in: query
          required: false
          description: Opaque cursor from a previous response's nextCursor. A malformed value is rejected with 400.
          schema:
            type: string
      responses:
        "200":
          description: Live offices for the tenant (limit 100), newest first, with an opaque nextCursor for the next page (null on the last page).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Office"
                      nextCursor:
                        type: string
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createOffice
      tags:
        - Tenant Admin
      summary: Create an office.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - officeCode
                - officeName
              properties:
                officeCode:
                  type: string
                officeName:
                  type: string
                officeType:
                  type: string
                  enum:
                    - head_office
                    - branch
                    - store
                    - warehouse
                    - other
                parentOfficeId:
                  type: string
                  format: uuid
                  nullable: true
                  description: Must reference a live office in the SAME tenant. An id that is unknown, soft-deleted, or belongs to another tenant is rejected identically with 400 — the responses are deliberately indistinguishable so the field cannot be used to probe for office ids elsewhere on the platform.
      responses:
        "201":
          description: Office created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/Office"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: officeCode is already taken by a live office in this tenant (OFFICE_CODE_ALREADY_EXISTS).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/offices/{id}:
    get:
      operationId: getOffice
      tags:
        - Tenant Admin
      summary: Fetch one office.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Office detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/Office"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateOffice
      tags:
        - Tenant Admin
      summary: Update an office.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                officeName:
                  type: string
                officeType:
                  type: string
                  enum:
                    - head_office
                    - branch
                    - store
                    - warehouse
                    - other
                status:
                  type: string
                  enum:
                    - active
                    - inactive
      responses:
        "200":
          description: Office updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/Office"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteOffice
      tags:
        - Tenant Admin
      summary: Soft-delete an office (audited, restorable).
      description: Sets deleted_at/deleted_by/delete_reason; the office code is freed for reuse and the row remains restorable via POST /api/v1/offices/{id}/restore. Not a hard delete.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: false
        description: Optional. A bodyless delete is accepted (delete_reason stays null); a present reason is stored and audited. A blank reason is rejected.
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Office soft-deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum:
                          - deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/offices/{id}/restore:
    post:
      operationId: restoreOffice
      tags:
        - Tenant Admin
      summary: Restore a soft-deleted office (audited).
      description: Clears the delete stamps and records restored_at/restored_by. 404 when the id is not currently soft-deleted (idempotent-safe). 409 when a live office has since taken the same code.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Office restored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/Office"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A live office already uses this office code (OFFICE_CODE_ALREADY_EXISTS).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/settings:
    get:
      operationId: getSettings
      tags:
        - Tenant Admin
      summary: Current tenant's settings.
      responses:
        "200":
          description: Tenant settings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      tenantId:
                        type: string
                        format: uuid
                      tenantName:
                        type: string
                      legalName:
                        type: string
                        nullable: true
                      defaultLocale:
                        type: string
                      defaultTheme:
                        type: string
                      timezone:
                        type: string
                      featureFlags:
                        type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      operationId: patchSettings
      tags:
        - Tenant Admin
      summary: Update tenant settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenantName:
                  type: string
                legalName:
                  type: string
                  nullable: true
                defaultLocale:
                  type: string
                  enum:
                    - id
                    - en
                    - ms
                    - ar
                defaultTheme:
                  type: string
                  enum:
                    - light
                    - dark
                    - system
                timezone:
                  type: string
                featureFlags:
                  type: object
      responses:
        "200":
          description: Updated tenant settings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/setup/initialize:
    post:
      operationId: postSetupInitialize
      tags:
        - Tenant Admin
      summary: Bootstrap the first tenant, owner, office, role, and access assignment. Rejected once already locked.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tenantCode
                - tenantName
                - officeCode
                - officeName
                - ownerLoginIdentifier
                - ownerPassword
                - ownerDisplayName
              properties:
                tenantCode:
                  type: string
                tenantName:
                  type: string
                officeCode:
                  type: string
                officeName:
                  type: string
                ownerLoginIdentifier:
                  type: string
                ownerPassword:
                  type: string
                  minLength: 8
                ownerDisplayName:
                  type: string
      responses:
        "200":
          description: Tenant bootstrapped.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      tenantId:
                        type: string
                        format: uuid
                      officeId:
                        type: string
                        format: uuid
                      ownerProfileId:
                        type: string
                        format: uuid
                      ownerIdentityId:
                        type: string
                        format: uuid
                      ownerTenantUserId:
                        type: string
                        format: uuid
                      ownerRoleId:
                        type: string
                        format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Setup already completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/setup/status:
    get:
      operationId: getSetupStatus
      tags:
        - Tenant Admin
      summary: Whether the one-time setup wizard has already run.
      security: []
      responses:
        "200":
          description: Setup lock state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      locked:
                        type: boolean
                      tenantId:
                        type: string
                        format: uuid
                      lockedAt:
                        type: string
                        format: date-time
components:
  schemas:
    Office:
      type: object
      properties:
        id:
          type: string
          format: uuid
        officeCode:
          type: string
        officeName:
          type: string
        officeType:
          type: string
        parentOfficeId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
