# Source fragment for the "email" module (Issue #182, epic #177).
#
# Owns every path whose operations carry this module's OpenAPI tag(s), plus
# every components.schemas entry referenced ONLY by this module's operations.
# Schemas shared by 2+ modules (or referenced by none) live in the root
# fragment (openapi/awcms-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI: $ref targets pointing at shared components
# (securitySchemes/parameters/responses and cross-module schemas) only resolve
# after `bun run openapi:bundle` merges this file with the root fragment and
# every sibling module fragment into openapi/awcms-public-api.openapi.yaml.
# Edit this file (or the root fragment for shared components), never the
# generated bundle.
paths:
  /api/v1/email/announcements:
    post:
      tags:
        - Email
      operationId: emailCreateAnnouncement
      summary: Enqueue a notification/announcement (idempotent, two-tier ABAC, audited).
      description: Requires Idempotency-Key. email.notification.create for every request; email.announcement.create additionally for role/tenant targets.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateKey:
                  type: string
                variables:
                  type: object
                target:
                  type: object
                locale:
                  type: string
      responses:
        "200":
          description: Recipients enqueued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      recipientCount:
                        type: integer
                      truncated:
                        type: boolean
                        description: True when more users matched the target than the per-request recipient cap, so the remainder were NOT enqueued. Callers must treat a truncated response as a partial send and re-target the remainder.
                      correlationId:
                        type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/email/announcements/preview:
    post:
      tags:
        - Email
      operationId: emailPreviewAnnouncement
      summary: Dry-run announcement targeting — recipient count + synthetic sample only.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateKey:
                  type: string
                variables:
                  type: object
                target:
                  type: object
                locale:
                  type: string
      responses:
        "200":
          description: Preview (count + sample render).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      matchedCount:
                        type: integer
                        description: Capped at the per-request recipient cap. Read together with `truncated` — a capped preview under-reports the real audience.
                      truncated:
                        type: boolean
                        description: True when more users matched the target than the cap, so `matchedCount` is the cap and not the real total.
                      sample:
                        type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/email/messages:
    get:
      tags:
        - Email
      operationId: emailListMessages
      summary: Email delivery-queue diagnostics (masked recipient only, keyset-paginated).
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - queued
              - sending
              - sent
              - failed
              - retry_wait
              - cancelled
              - suppressed
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Queue page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/email/messages/{id}/cancel:
    post:
      tags:
        - Email
      operationId: emailCancelMessage
      summary: Cancel a still-queued (queued/retry_wait) email message (audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Message cancelled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The message is past a cancellable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/email/suppressions:
    get:
      tags:
        - Email
      operationId: emailListSuppressions
      summary: List the email suppression list (masked recipient only).
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Suppression entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Email
      operationId: emailCreateSuppression
      summary: Manually suppress a recipient address (audited).
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recipient:
                  type: string
                reason:
                  type: string
                  enum:
                    - bounced
                    - complained
                    - manual
                    - unsubscribed
      responses:
        "200":
          description: Recipient suppressed (or already suppressed).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/email/suppressions/{id}:
    delete:
      tags:
        - Email
      operationId: emailDeleteSuppression
      summary: Remove a suppression entry (hard delete, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Suppression entry removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/email/templates:
    get:
      tags:
        - Email
      operationId: emailListTemplates
      summary: List tenant email templates (active by default, newest first).
      parameters:
        - name: includeInactive
          in: query
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Template list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Email
      operationId: emailCreateTemplate
      summary: Create an email template (audited).
      description: 409 if an active template already exists for the templateKey.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateKey:
                  type: string
                name:
                  type: string
                subjectTemplate:
                  type: object
                textBodyTemplate:
                  type: object
                htmlBodyTemplate:
                  type: object
                isActive:
                  type: boolean
      responses:
        "200":
          description: Template created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: An active template already exists for the templateKey.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/email/templates/{id}:
    get:
      tags:
        - Email
      operationId: emailGetTemplate
      summary: Get one email template (full locale map).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Template detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Email
      operationId: emailUpdateTemplate
      summary: Partially update an email template (audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                subjectTemplate:
                  type: object
                textBodyTemplate:
                  type:
                    - object
                    - "null"
                htmlBodyTemplate:
                  type:
                    - object
                    - "null"
                isActive:
                  type: boolean
      responses:
        "200":
          description: Template updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Email
      operationId: emailDeleteTemplate
      summary: Soft-delete an email template (reason required, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Template soft-deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/email/templates/{id}/preview:
    post:
      tags:
        - Email
      operationId: emailPreviewTemplate
      summary: Render a template with synthetic sample data (never a real recipient).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                locale:
                  type: string
                variables:
                  type: object
      responses:
        "200":
          description: Rendered preview.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/email/templates/{id}/restore:
    post:
      tags:
        - Email
      operationId: emailRestoreTemplate
      summary: Restore a soft-deleted email template (audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Template restored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
