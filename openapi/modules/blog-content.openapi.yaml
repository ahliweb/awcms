      responses:
        "200":
          description: Ad updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Blog Content
      operationId: blogDeleteAd
      summary: Soft delete an advertisement
      description: Gated by blog_content.ads.configure.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Ad soft-deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/blog/theme:
    get:
      tags:
        - Blog Content
      operationId: blogGetTheme
      summary: Read this tenant's blog theme mode setting
      description: Gated by blog_content.theme.read. Absence of a row means "inherit the tenant's default_theme".
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: The theme setting.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum: [light, dark, system]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags:
        - Blog Content
      operationId: blogUpdateTheme
      summary: Update this tenant's blog theme mode setting
      description: Gated by blog_content.theme.configure.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [light, dark, system]
      responses:
        "200":
          description: Theme setting updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum: [light, dark, system]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/blog/internal-tag-links/settings:
    get:
      tags:
        - Blog Content
      operationId: blogGetInternalTagLinkSettings
      summary: Read this tenant's automatic internal tag linking policy
      description: Gated by blog_content.internal_links.read.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: The policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "#/components/schemas/BlogInternalTagLinkSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags:
        - Blog Content
      operationId: blogUpdateInternalTagLinkSettings
      summary: Update this tenant's automatic internal tag linking policy
      description: Gated by blog_content.internal_links.configure. disabledTagIds are validated against this tenant's own tag catalog.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                caseInsensitive:
                  type: boolean
                disabledTagIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Policy updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "#/components/schemas/BlogInternalTagLinkSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  schemas:
    BlogPostWriteInput:
      type: object
      description: Shared shape for POST /api/v1/blog/posts (all fields required) and PATCH /api/v1/blog/posts/{id} (all fields optional, only present fields change).
      properties:
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
          nullable: true
        contentJson:
          type: object
          description: "{ blocks: ContentBlock[] } — whitelisted block types only (paragraph, heading, list, quote, gallery, video_news); never raw HTML."
        contentText:
          type: string
        locale:
          type: string
        visibility:
          type: string
          enum: [public, private, unlisted]
        featuredMediaId:
          type: string
          format: uuid
          nullable: true
        seoImageMediaId:
          type: string
          format: uuid
          nullable: true
          description: Explicit "use this image for social/SEO preview" override — takes priority over featuredMediaId.
        seoTitle:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        canonicalUrl:
          type: string
          nullable: true
        termIds:
          type: array
          items:
            type: string
            format: uuid
        translationGroupId:
          type: string
          format: uuid
          nullable: true
        autoInternalTagLinksDisabled:
          type: boolean
          description: Per-post opt-out of automatic internal tag linking.
    BlogPost:
      type: object
      required:
        [
          id,
          tenantId,
          title,
          slug,
          status,
          visibility,
          locale,
          createdAt,
          updatedAt,
          version
        ]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        authorTenantUserId:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
          nullable: true
        contentJson:
          type: object
        contentText:
          type: string
        status:
          type: string
          enum: [draft, review, scheduled, published, archived]
        visibility:
          type: string
          enum: [public, private, unlisted]
        featuredMediaId:
          type: string
          format: uuid
          nullable: true
        seoImageMediaId:
          type: string
          format: uuid
          nullable: true
        seoTitle:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        canonicalUrl:
          type: string
          nullable: true
        locale:
