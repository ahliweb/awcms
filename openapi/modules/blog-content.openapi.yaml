          format: date-time
          nullable: true
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
        termIds:
          type: array
          items:
            type: string
            format: uuid
    BlogPageWriteInput:
      type: object
      description: Shared shape for POST /api/v1/blog/pages and PATCH /api/v1/blog/pages/{id} (all fields optional on update).
      properties:
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
          nullable: true
        contentJson:
          type: object
        contentText:
          type: string
        locale:
          type: string
        visibility:
          type: string
          enum: [public, private, unlisted]
        featuredMediaId:
          type: string
          format: uuid
          nullable: true
        seoTitle:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        canonicalUrl:
          type: string
          nullable: true
        pageType:
          type: string
          enum: [standard, landing, legal, system]
        parentPageId:
          type: string
          format: uuid
          nullable: true
