          nullable: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
    BlogTerm:
      type: object
      required: [id, tenantId, taxonomyType, name, slug]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        taxonomyType:
          type: string
          enum: [category, tag]
        parentId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
    BlogRevision:
      type: object
      required:
        [
          id,
          tenantId,
          resourceType,
          resourceId,
          revisionNumber,
          title,
          status,
          createdAt
        ]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        resourceType:
          type: string
          enum: [post, page]
        resourceId:
          type: string
          format: uuid
        revisionNumber:
          type: integer
        title:
          type: string
        contentJson:
          type: object
        contentText:
          type: string
        excerpt:
          type: string
          nullable: true
        seoTitle:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        canonicalUrl:
          type: string
          nullable: true
        status:
          type: string
        changeNote:
          type: string
          nullable: true
        createdByTenantUserId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    BlogSettings:
      type: object
      properties:
        blogTitle:
          type: string
          nullable: true
        blogDescription:
          type: string
          nullable: true
        defaultLocale:
          type: string
        defaultVisibility:
          type: string
          enum: [public, private, unlisted]
        postsPerPage:
          type: integer
        seoDefaultTitle:
          type: string
          nullable: true
        seoDefaultDescription:
          type: string
          nullable: true
        rssEnabled:
          type: boolean
        sitemapEnabled:
          type: boolean
        contentQualityChecklistPolicy:
          type: object
        socialPreviewFallbackImageMediaId:
          type: string
          format: uuid
          nullable: true
        socialPreviewContentImageFallbackEnabled:
          type: boolean
    BlogMenuItem:
      type: object
      required: [id, label, linkType, sortOrder]
      properties:
        id:
          type: string
          format: uuid
        parentItemId:
          type: string
          format: uuid
          nullable: true
        label:
          type: string
        linkType:
          type: string
          enum: [post, page, url]
        targetId:
          type: string
          format: uuid
          nullable: true
        url:
          type: string
          nullable: true
        sortOrder:
          type: integer
    BlogAdPlacement:
      type: object
      required: [placementType]
      properties:
        placementType:
          type: string
          enum: [global, widget, post, page]
        targetId:
          type: string
          format: uuid
          nullable: true
    BlogInternalTagLinkSettings:
      type: object
      required: [enabled, caseInsensitive, disabledTagIds]
      properties:
        enabled:
          type: boolean
        caseInsensitive:
          type: boolean
        disabledTagIds:
          type: array
          items:
            type: string
            format: uuid
    ContentQualityChecklistResult:
      type: object
      required: [applicable, passed, blockers]
      description: "notApplicableChecklistResult() when full-online R2-only mode is not active for the tenant (applicable=false, passed=true, blockers=[]) — otherwise a full evaluation."
      properties:
        applicable:
          type: boolean
        passed:
          type: boolean
        blockers:
          type: array
          items:
            type: object
            required: [ruleId, message]
            properties:
              ruleId:
                type: string
              message:
                type: string
        warnings:
          type: array
          items:
            type: object
