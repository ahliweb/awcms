# Source fragment for the "domain-event-runtime" module (Issue #182, epic #177).
#
# Owns every path whose operations carry this module's OpenAPI tag(s), plus
# every components.schemas entry referenced ONLY by this module's operations.
# Schemas shared by 2+ modules (or referenced by none) live in the root
# fragment (openapi/awcms-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI: $ref targets pointing at shared components
# (securitySchemes/parameters/responses and cross-module schemas) only resolve
# after `bun run openapi:bundle` merges this file with the root fragment and
# every sibling module fragment into openapi/awcms-public-api.openapi.yaml.
# Edit this file (or the root fragment for shared components), never the
# generated bundle.
paths:
  /api/v1/domain-events/consumers:
    get:
      operationId: listDomainEventConsumers
      tags:
        - Domain Event Runtime
      summary: List the static consumer registry with per-tenant pause state and backlog counts.
      responses:
        "200":
          description: Consumer registry with pause/backlog state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      consumers:
                        type: array
                        items:
                          type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/domain-events/consumers/{name}/pause:
    post:
      operationId: pauseDomainEventConsumer
      tags:
        - Domain Event Runtime
      summary: Pause a domain event consumer for this tenant (reason required, audited).
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  minLength: 1
                  maxLength: 500
      responses:
        "200":
          description: Updated consumer state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      consumer:
                        type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/domain-events/consumers/{name}/resume:
    post:
      operationId: resumeDomainEventConsumer
      tags:
        - Domain Event Runtime
      summary: Resume a paused domain event consumer for this tenant (audited).
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated consumer state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      consumer:
                        type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/domain-events/deliveries:
    get:
      operationId: listDomainEventDeliveries
      tags:
        - Domain Event Runtime
      summary: List consumer delivery/attempt status (status=dead_letter is the DLQ view).
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - delivered
              - dead_letter
              - skipped
        - name: consumerName
          in: query
          required: false
          schema:
            type: string
        - name: eventType
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Delivery list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      deliveries:
                        type: array
                        items:
                          type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/domain-events/deliveries/{id}:
    get:
      operationId: getDomainEventDelivery
      tags:
        - Domain Event Runtime
      summary: Fetch one delivery with its joined event (redacted payload projection). DLQ inspection view.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Delivery detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      delivery:
                        type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/domain-events/deliveries/{id}/replay:
    post:
      operationId: replayDomainEventDelivery
      tags:
        - Domain Event Runtime
      summary: Replay a dead-lettered delivery (permission-gated, reason-required, idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  minLength: 1
                  maxLength: 500
      responses:
        "200":
          description: The newly created replay delivery.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      delivery:
                        type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Delivery not dead-lettered, or consumer no longer supports the event schema.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/BadRequest"
  /api/v1/domain-events/events:
    get:
      operationId: listDomainEvents
      tags:
        - Domain Event Runtime
      summary: List domain event outbox entries (redacted payload projections only, max 200).
      parameters:
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: aggregateType
          in: query
          required: false
          schema:
            type: string
        - name: aggregateId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Domain event list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      events:
                        type: array
                        items:
                          type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/domain-events/events/{id}:
    get:
      operationId: getDomainEvent
      tags:
        - Domain Event Runtime
      summary: Fetch one domain event outbox entry (redacted payload projection only).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Domain event detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      event:
                        type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
