      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: The revision list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      revisions:
                        type: array
                        items:
                          $ref: "#/components/schemas/BlogRevision"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/blog/posts/{id}/revisions/{revisionId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: revisionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Blog Content
      operationId: blogGetPostRevision
      summary: Read one revision of a post
      description: Gated by blog_content.revisions.read.
