    post:
      operationId: postAuthMfaEnrollVerify
      tags:
        - Identity & Access
      summary: Confirm a pending TOTP enrollment; activates the factor and returns recovery codes.
      description: Authorized by EITHER a live session OR an enrollment grant. When authorized via an enrollment grant (a login that returned MFA_ENROLLMENT_REQUIRED), the grant is consumed and a fresh aal2 session token is returned.
      parameters:
        - name: X-AWCMS-MFA-Enrollment-Token
          in: header
          required: false
          description: Enrollment grant token; used in place of a session to complete the "must enroll" login.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Factor activated; recovery codes shown once. token/expiresAt/assuranceLevel are present only when enrolled via an enrollment grant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      activated:
                        type: boolean
                      recoveryCodes:
                        type: array
                        items:
                          type: string
                      token:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time
                      assuranceLevel:
                        type: string
                        enum:
                          - aal2
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: MFA misconfigured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
