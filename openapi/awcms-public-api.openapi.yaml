            type: string
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Published (or an idempotent replay).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/ThemeVersion"
        "400":
