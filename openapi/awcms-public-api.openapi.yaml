openapi: 3.1.0
info:
  title: AWCMS Public API
  version: 0.1.0
  description: |-
    REST contract for the AWCMS foundation modules (tenant-admin, profile-identity,
    identity-access, logging). Every endpoint that accepts a body enforces an
    application-level size cap (default 128 KiB) independent of any reverse-proxy
    limit; a body over the limit is rejected with `413 Payload Too Large` /
    `PAYLOAD_TOO_LARGE`, using the same envelope as every other error response.
servers:
  - url: http://localhost:4321
    description: Local development
tags:
  - name: Foundation
    description: Foundation and platform endpoints.
  - name: Tenant Admin
    description: Tenant, office, tenant settings, and the one-time setup wizard.
  - name: Identity & Access
    description: Login identity, session authentication, and tenant user membership.
  - name: Profile Identity
    description: Canonical person/organization profile lifecycle, identifiers, and entity links.
  - name: Logging & Audit
    description: Cross-module audit trail (awcms_audit_events) and its read API.
  - name: Module Management
    description: Database-backed module registry, tenant module lifecycle, settings, permission sync, jobs, and health.
  - name: Sync Storage
    description: Offline-first sync node registration, HMAC-signed push/pull, conflict tracking, and the object sync upload queue.
  - name: Workflow Approval
    description: Managed, versioned graph-based approval workflows — definition lifecycle, approval inbox/decisions, delegation, escalation, and administrative recovery.
  - name: Email
    description: Provider-neutral transactional email — template management, bulk announcement/notification enqueue, delivery-queue diagnostics/cancel, and suppression list.
  - name: Management Reporting
    description: Generic management reporting views (tenant activity, access/audit summary, sync health, module usage, email queue health) built as live read-aggregations over the foundation modules' tables.
  - name: Reporting Projections
    description: Module-contributed read-model projection extension to Management Reporting — list registered projection descriptors with live snapshot/freshness status, trigger/resume/cancel an idempotent full rebuild, trigger an on-demand reconciliation against a source control total, and manage/trigger/download scheduled exports (manifest/checksum/expiry, secure tenant-scoped download). A projection is a DERIVED read model, never an authorization source of truth — every operation independently re-checks RBAC/ABAC.
security:
  - bearerAuth: []
    tenantHeader: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Opaque session token issued by POST /auth/login.
    tenantHeader:
      type: apiKey
      in: header
      name: X-AWCMS-Tenant-ID
      description: Active tenant context for tenant-scoped API.
    syncHmac:
      type: apiKey
      in: header
      name: X-AWCMS-Signature
      description: HMAC-SHA256 signature over "<timestamp>.<body>" for machine-to-machine sync endpoints (with X-AWCMS-Node-ID and X-AWCMS-Timestamp).
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
    SyncNodeId:
      name: X-AWCMS-Node-ID
      in: header
      required: true
      description: Node code identifying the calling sync node (auto-registers on first contact).
      schema:
        type: string
    SyncTimestamp:
      name: X-AWCMS-Timestamp
      in: header
      required: true
      description: ISO-8601 timestamp of the request, validated against the allowed skew (anti-replay).
      schema:
        type: string
    SyncSignature:
      name: X-AWCMS-Signature
      in: header
      required: true
      description: HMAC-SHA256 signature over "<timestamp>.<body>".
      schema:
        type: string
  responses:
    BadRequest:
      description: Validation error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    Unauthorized:
      description: Missing or invalid session.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    Forbidden:
      description: Access denied by RBAC/ABAC.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
  schemas:
    ApiMeta:
      type: object
      properties:
        correlationId: { type: string }
        requestId: { type: string }
    ApiError:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, enum: [false] }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
        meta: { $ref: "#/components/schemas/ApiMeta" }
    Office:
      type: object
      properties:
        id: { type: string, format: uuid }
        officeCode: { type: string }
        officeName: { type: string }
        officeType: { type: string }
        parentOfficeId: { type: string, format: uuid, nullable: true }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ProfileMasked:
      type: object
      properties:
        id: { type: string, format: uuid }
        profileType: { type: string }
        displayName: { type: string }
        legalName: { type: string, nullable: true }
        status: { type: string }
        verificationStatus: { type: string }
        riskLevel: { type: string }
        mergedIntoProfileId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }
        deleteReason: { type: string, nullable: true }
        restoredAt: { type: string, format: date-time, nullable: true }
    ProfileIdentifierMasked:
      type: object
      properties:
        id: { type: string, format: uuid }
        profileId: { type: string, format: uuid }
        identifierType: { type: string }
        maskedValue: { type: string }
        isPrimary: { type: boolean }
        verificationStatus: { type: string }
    ProfileEntityLink:
      type: object
      properties:
        id: { type: string, format: uuid }
        moduleKey: { type: string }
        entityType: { type: string }
        entityId: { type: string, format: uuid }
        linkRole: { type: string }
        createdAt: { type: string, format: date-time }
    AuditEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        actorTenantUserId: { type: string, format: uuid, nullable: true }
        moduleKey: { type: string }
        action: { type: string }
        resourceType: { type: string }
        resourceId: { type: string, nullable: true }
        severity: { type: string }
        message: { type: string }
        attributes: { type: object, nullable: true }
        correlationId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    ModuleCatalogEntry:
      type: object
      properties:
        moduleKey: { type: string }
        name: { type: string }
        version: { type: string }
        description: { type: string }
        status: { type: string }
        type: { type: string, nullable: true }
        isCore: { type: boolean }
        dependencies: { type: array, items: { type: string } }
        api:
          type: object
          nullable: true
          properties:
            openApiPath: { type: string }
            basePath: { type: string }
        events: { type: object, nullable: true }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
    ModuleSyncResult:
      type: object
      properties:
        created: { type: array, items: { type: string } }
        updated: { type: array, items: { type: string } }
        unchanged: { type: array, items: { type: string } }
        orphaned: { type: array, items: { type: string } }
    ModuleJob:
      type: object
      properties:
        moduleKey: { type: string }
        command: { type: string }
        purpose: { type: string }
        recommendedSchedule: { type: string }
        environmentNotes: { type: string }
        safeInOfflineLan: { type: boolean }
    ModuleHealthReport:
      type: object
      properties:
        moduleKey: { type: string }
        status: { type: string, enum: [healthy, degraded, failed, unknown] }
        signals:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              status: { type: string, enum: [pass, fail, not_applicable] }
              detail: { type: string }
        generatedAt: { type: string, format: date-time }
    ModulePermissionSyncReport:
      type: object
      properties:
        moduleKey: { type: string }
        entries:
          type: array
          items:
            type: object
            properties:
              moduleKey: { type: string }
              activityCode: { type: string }
              action: { type: string }
              status:
                type: string
                enum: [synced, missing, orphaned, mismatched_description]
              descriptorDescription: { type: string, nullable: true }
              catalogDescription: { type: string, nullable: true }
    TenantModule:
      type: object
      properties:
        moduleKey: { type: string }
        name: { type: string }
        version: { type: string }
        isCore: { type: boolean }
        tenantEnabled: { type: boolean }
        enabledAt: { type: string, format: date-time, nullable: true }
        disabledAt: { type: string, format: date-time, nullable: true }
        disableReason: { type: string, nullable: true }
    ModuleSettingsView:
      type: object
      properties:
        moduleKey: { type: string }
        schemaVersion: { type: integer }
        defaults: { type: object, additionalProperties: true }
        tenantOverride: { type: object, additionalProperties: true }
        effective: { type: object, additionalProperties: true }
        updatedAt: { type: string, format: date-time, nullable: true }
paths:
  /api/v1/workflows/definitions:
    get:
      tags: [Workflow Approval]
      operationId: workflowsListDefinitions
      summary: List workflow definitions (latest version per workflow key).
      description: One row per distinct workflowKey (latest version, or latest matching the lifecycleStatus filter). See GET /definitions/{id} for full version history.
      parameters:
        - name: lifecycleStatus
          in: query
          schema: { type: string, enum: [draft, active, retired] }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Latest version per distinct workflow key.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Workflow Approval]
      operationId: workflowsCreateDefinition
      summary: Create a new draft workflow definition.
      description: Creates a draft version 1 (or the next draft version if the workflowKey already has history). Guarded by workflow.definition.create.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workflowKey, name, graph]
              properties:
                workflowKey: { type: string }
                name: { type: string }
                description: { type: string }
                graph: { type: object }
                factsSchema: { type: array, items: { type: object } }
      responses:
        "200":
          description: Draft definition created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/workflows/definitions/{id}:
    get:
      tags: [Workflow Approval]
      operationId: workflowsGetDefinition
      summary: Get a workflow definition and its full version history.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Definition detail plus every version of the same workflow key.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Workflow Approval]
      operationId: workflowsUpdateDefinition
      summary: Update a draft workflow definition in place.
      description: 409 if the definition is not a draft (fork a new version via POST /new-version instead).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                graph: { type: object }
                factsSchema: { type: array, items: { type: object } }
      responses:
        "200":
          description: Draft definition updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: The definition is not a draft.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
    delete:
      tags: [Workflow Approval]
      operationId: workflowsDeleteDefinition
      summary: Soft-delete a draft workflow definition (idempotent, audited).
      description: High-risk — requires Idempotency-Key. 409 for any non-draft (published/retired version history is permanent).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Draft definition soft-deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Idempotency-Key reused with a different request, or the definition is not a draft.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/workflows/definitions/{id}/new-version:
    post:
      tags: [Workflow Approval]
      operationId: workflowsCreateDefinitionNewVersion
      summary: Fork a new draft version from an existing definition.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: New draft version created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/workflows/definitions/{id}/publish:
    post:
      tags: [Workflow Approval]
      operationId: workflowsPublishDefinition
      summary: Publish/activate a draft workflow definition version (idempotent, audited).
      description: Transitions draft to active, retiring any previously-active version of the same workflow key in the same transaction. High-risk — requires Idempotency-Key.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Definition published.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Idempotency-Key reused with a different request, or the definition is not a draft.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/workflows/definitions/{id}/retire:
    post:
      tags: [Workflow Approval]
      operationId: workflowsRetireDefinition
      summary: Voluntarily retire an active workflow definition version (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Definition retired.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Idempotency-Key reused with a different request, or the definition is not active.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/workflows/definitions/{id}/validate:
    post:
      tags: [Workflow Approval]
      operationId: workflowsValidateDefinition
      summary: Dry-run validate a workflow definition graph (stored, or a candidate in the body).
      description: Read-only, non-persisting. Never fails the HTTP call for an invalid graph — returns the validation result in the body.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                graph: {}
                factsSchema: {}
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/workflows/delegations:
    get:
      tags: [Workflow Approval]
      operationId: workflowsListDelegations
      summary: List workflow delegations.
      parameters:
        - name: delegatorTenantUserId
          in: query
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Delegations (limit 100), newest first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Workflow Approval]
      operationId: workflowsCreateDelegation
      summary: Create a workflow delegation from the calling tenant user (idempotent, audited).
      description: A tenant user can only delegate their OWN standing. High-risk — requires Idempotency-Key.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [delegateTenantUserId, reason]
              properties:
                delegateTenantUserId: { type: string, format: uuid }
                workflowKey: { type: string }
                resourceType: { type: string }
                effectiveFrom: { type: string, format: date-time }
                effectiveTo: { type: string, format: date-time }
                reason: { type: string }
      responses:
        "200":
          description: Delegation created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/workflows/delegations/{id}/revoke:
    post:
      tags: [Workflow Approval]
      operationId: workflowsRevokeDelegation
      summary: Revoke a workflow delegation (delegator only, idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Delegation revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/workflows/instances/{id}:
    get:
      tags: [Workflow Approval]
      operationId: workflowsGetInstance
      summary: Get a workflow instance's detail and immutable action history.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Instance detail plus decision/audit history, newest first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/workflows/instances/{id}/cancel:
    post:
      tags: [Workflow Approval]
      operationId: workflowsCancelInstance
      summary: Administrative recovery — cancel a running (pending) workflow instance (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              additionalProperties: false
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Instance cancelled, along with every one of its pending tasks.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Idempotency-Key reused with a different request, or the instance is not pending.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/workflows/tasks:
    get:
      tags: [Workflow Approval]
      operationId: workflowsGetPendingTasks
      summary: Consolidated approval inbox — keyset-paginated, filterable task list.
      parameters:
        - name: workflowKey
          in: query
          schema: { type: string }
        - name: resourceType
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            { type: string, enum: [pending, completed, skipped, cancelled] }
        - name: overdue
          in: query
          schema: { type: boolean }
        - name: search
          in: query
          schema: { type: string }
        - name: cursor
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Tasks matching the filters (limit 100) with an opaque nextCursor for the next page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/workflows/tasks/{id}/decisions:
    post:
      tags: [Workflow Approval]
      operationId: workflowsRecordTaskDecision
      summary: Record a decision (approve/reject) for a pending workflow task (idempotent, audited).
      description: The task completes only once its quorum rule is satisfied; the instance advances through the graph only once the task completes. High-risk — requires Idempotency-Key.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision: { type: string, enum: [approve, reject] }
                reason: { type: string }
      responses:
        "200":
          description: Decision recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Access denied by RBAC/ABAC/self-approval, or the caller is not an eligible decider for this task.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Idempotency-Key reused with a different request, or the task's decision has already been recorded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/workflows/tasks/{id}/force-decision:
    post:
      tags: [Workflow Approval]
      operationId: workflowsForceTaskDecision
      summary: Administrative recovery — force-approve/force-reject a pending task, bypassing quorum (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, reason]
              properties:
                decision: { type: string, enum: [approve, reject] }
                reason: { type: string }
      responses:
        "200":
          description: Task force-decided and the instance advanced accordingly.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Idempotency-Key reused with a different request, or the task is not pending.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/workflows/tasks/{id}/reassign:
    post:
      tags: [Workflow Approval]
      operationId: workflowsReassignTask
      summary: Administrative recovery — reassign a pending task to another tenant user (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toTenantUserId, reason]
              properties:
                toTenantUserId: { type: string, format: uuid }
                reason: { type: string }
      responses:
        "200":
          description: Task reassigned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: >-
            Idempotency-Key reused with a different request, the task is not
            pending, or the target has already decided this task (reassigning
            to them would let one person's authority count twice toward
            quorum).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/health:
    get:
      operationId: getHealth
      tags: [Foundation]
      summary: Liveness/module-count probe.
      security: []
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      status: { type: string }
                      service: { type: string }
                      runtime: { type: string }
                      moduleCount: { type: integer }
                      generatedAt: { type: string, format: date-time }
  /api/v1/database/pool/health:
    get:
      operationId: getDatabasePoolHealth
      tags: [Foundation]
      summary: Database pool/work-class saturation, circuit-breaker state, and per-process capacity for this instance.
      security: []
      responses:
        "200":
          description: Aggregate pool health (never exposes tenant data or query content).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [healthy, degraded, unhealthy]
                      databaseReachable: { type: boolean }
                      circuitBreakerState:
                        type: string
                        enum: [closed, open, half_open]
                      workClasses:
                        type: array
                        items:
                          type: object
                          properties:
                            workClass: { type: string }
                            active: { type: integer }
                            max: { type: integer }
                            queued: { type: integer }
                      capacity:
                        type: object
                        properties:
                          processClass: { type: string }
                          poolMax: { type: integer }
                          approvedConnections: { type: integer }
                          reservedAdminHeadroom: { type: integer }
                      generatedAt: { type: string, format: date-time }
  /api/v1/setup/status:
