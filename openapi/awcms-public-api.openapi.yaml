    get:
      operationId: getDatabasePoolHealth
      tags:
        - Foundation
      summary: Database pool/work-class saturation, circuit-breaker state, and per-process capacity for this instance.
      security: []
      responses:
        "200":
          description: Aggregate pool health (never exposes tenant data or query content).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - healthy
                          - degraded
                          - unhealthy
                      databaseReachable:
                        type: boolean
                      circuitBreakerState:
                        type: string
                        enum:
                          - closed
                          - open
                          - half_open
                      workClasses:
                        type: array
                        items:
                          type: object
                          properties:
                            workClass:
                              type: string
                            active:
                              type: integer
                            max:
                              type: integer
                            queued:
                              type: integer
                      capacity:
                        type: object
                        properties:
                          processClass:
                            type: string
                          poolMax:
                            type: integer
                          approvedConnections:
                            type: integer
                          reservedAdminHeadroom:
                            type: integer
                      generatedAt:
                        type: string
                        format: date-time
