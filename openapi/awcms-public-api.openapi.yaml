  /api/v1/media/enforcement:
    get:
      tags:
        - News Media
      summary: Read whether managed-media enforcement is active for this tenant
      description: Gated by media_library.enforcement.read. Reports whether this tenant's content media references must resolve to verified registry objects, and — when enforcement cannot be enabled — the deployment-config reasons why (ADR-0036 step 5a). `reasons` name environment variables, never their values, so nothing secret is exposed; the endpoint is still permission-gated rather than public.
      operationId: mediaEnforcementRead
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Current enforcement state for this tenant plus this deployment's media readiness.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/MediaEnforcementState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - News Media
      summary: Turn managed-media enforcement ON for this tenant (one-way)
      description: "Gated by media_library.enforcement.enable. Enables managed-media enforcement: from then on, content media references must resolve to verified, same-tenant registry objects rather than raw URLs (ADR-0036 step 5a). This is the switch a brochure-site tenant (`blog_content` + `tenant_domain`, no news portal) previously did not have. This operation is one-way and there is deliberately no counterpart that disables enforcement — a tenant able to switch its own media validation off is a confirmed exploit this design exists to prevent (see migration `sql/043`'s header). A deployment that must roll back does so by changing its `NEWS_MEDIA_R2_*` configuration. Idempotent: re-enabling an already-enforcing tenant succeeds, refreshes the timestamp, and returns `alreadyEnforced: true`. No `Idempotency-Key` is required."
      operationId: mediaEnforcementEnable
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Enforcement is active for this tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/MediaEnforcementEnabled"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: "The deployment's media storage is not ready, so enforcement cannot be enabled (`MANAGED_MEDIA_NOT_READY`) — `error.details.reasons` says which check failed. A 409 rather than a 400 on purpose: the request is well-formed and the caller is authorized; it is the deployment, not the request body, that must change."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/media/news-images/upload-sessions:
    post:
      tags:
