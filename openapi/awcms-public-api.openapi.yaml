        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mfaChallengeToken
              properties:
                mfaChallengeToken:
                  type: string
                code:
                  type: string
                recoveryCode:
                  type: string
      responses:
        "200":
          description: MFA verified; aal2 session issued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time
                      assuranceLevel:
                        type: string
                        enum:
                          - aal2
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Too many verification attempts from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: MFA misconfigured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
