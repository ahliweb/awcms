  /api/v1/tenant/modules/{moduleKey}/enable:
    post:
      operationId: enableTenantModule
      tags: [Module Management]
      summary: Enable a module for the current tenant (dependency-validated).
      parameters:
        - name: moduleKey
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Module enabled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      moduleKey: { type: string }
                      tenantEnabled: { type: boolean, enum: [true] }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Rejected — dependency/state conflict.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/tenant/modules/{moduleKey}/disable:
    post:
      operationId: disableTenantModule
