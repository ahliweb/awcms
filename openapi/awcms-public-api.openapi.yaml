                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/workflows/instances/{id}/cancel:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsCancelInstance
      summary: Administrative recovery — cancel a running (pending) workflow instance (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              additionalProperties: false
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Instance cancelled, along with every one of its pending tasks.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency-Key reused with a different request, or the instance is not pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/tasks:
    get:
      tags:
        - Workflow Approval
      operationId: workflowsGetPendingTasks
      summary: Consolidated approval inbox — keyset-paginated, filterable task list.
      parameters:
        - name: workflowKey
          in: query
          schema:
            type: string
        - name: resourceType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - pending
              - completed
              - skipped
              - cancelled
        - name: overdue
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Tasks matching the filters (limit 100) with an opaque nextCursor for the next page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/workflows/tasks/{id}/decisions:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsRecordTaskDecision
      summary: Record a decision (approve/reject) for a pending workflow task (idempotent, audited).
      description: The task completes only once its quorum rule is satisfied; the instance advances through the graph only once the task completes. High-risk — requires Idempotency-Key.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - decision
              properties:
                decision:
                  type: string
                  enum:
                    - approve
                    - reject
                reason:
                  type: string
      responses:
        "200":
          description: Decision recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Access denied by RBAC/ABAC/self-approval, or the caller is not an eligible decider for this task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or the task's decision has already been recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/tasks/{id}/force-decision:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsForceTaskDecision
      summary: Administrative recovery — force-approve/force-reject a pending task, bypassing quorum (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - decision
                - reason
              properties:
                decision:
                  type: string
                  enum:
                    - approve
                    - reject
                reason:
                  type: string
      responses:
        "200":
          description: Task force-decided and the instance advanced accordingly.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or the task is not pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/workflows/tasks/{id}/reassign:
    post:
      tags:
        - Workflow Approval
      operationId: workflowsReassignTask
      summary: Administrative recovery — reassign a pending task to another tenant user (idempotent, audited).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - toTenantUserId
                - reason
              properties:
                toTenantUserId:
                  type: string
                  format: uuid
                reason:
                  type: string
      responses:
        "200":
          description: Task reassigned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, the task is not pending, or the target has already decided this task (reassigning to them would let one person's authority count twice toward quorum).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Opaque session token issued by POST /auth/login.
    tenantHeader:
      type: apiKey
      in: header
      name: X-AWCMS-Tenant-ID
      description: Active tenant context for tenant-scoped API.
    syncHmac:
      type: apiKey
      in: header
      name: X-AWCMS-Signature
      description: HMAC-SHA256 signature over "<timestamp>.<body>" for machine-to-machine sync endpoints (with X-AWCMS-Node-ID and X-AWCMS-Timestamp).
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
    SyncNodeId:
      name: X-AWCMS-Node-ID
      in: header
      required: true
      description: Node code identifying the calling sync node (auto-registers on first contact).
      schema:
        type: string
    SyncTimestamp:
      name: X-AWCMS-Timestamp
      in: header
      required: true
      description: ISO-8601 timestamp of the request, validated against the allowed skew (anti-replay).
      schema:
        type: string
    SyncSignature:
      name: X-AWCMS-Signature
      in: header
      required: true
      description: HMAC-SHA256 signature over "<timestamp>.<body>".
      schema:
        type: string
  responses:
    BadRequest:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Missing or invalid session.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Access denied by RBAC/ABAC.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    AbacDslPolicy:
      type: object
      description: One stored dynamic ABAC (DSL) policy (Issue
      properties:
        id:
          type: string
          format: uuid
        policyCode:
          type: string
        effect:
          type: string
          enum:
            - allow
            - deny
        description:
          type: string
          nullable: true
        moduleKey:
          type: string
          nullable: true
        activityCode:
          type: string
          nullable: true
        action:
          type: string
          nullable: true
        resourceType:
          type: string
          nullable: true
        dslVersion:
          type: integer
        priority:
          type: integer
        conditions:
          $ref: "#/components/schemas/AbacDslPolicyConditions"
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AbacDslPolicyConditions:
      type: object
      description: "A bounded, deterministic condition AST (Issue #179). A node is either a composition — exactly one of `allOf` (array; empty = true), `anyOf` (array; empty = false), or `not` (a single node) — or a leaf `{ attr, op, value | valueAttr }` over the server-side attribute allow-list (`subject.*`, `resource.*`, `action`, `env.*`) with the bounded operator set (eq, ne, in, nin, lt, lte, gt, gte, exists). No regex, functions, or arbitrary expressions. Depth ≤ 32, ≤ 512 nodes."
      additionalProperties: true
    AbacDslPolicyWriteRequest:
      type: object
      required:
        - policyCode
        - effect
        - conditions
      properties:
        policyCode:
          type: string
          description: 3-100 chars, alphanumerics plus . _ - (not at the edges).
        effect:
          type: string
          enum:
            - allow
            - deny
        description:
          type: string
          nullable: true
        moduleKey:
          type: string
          nullable: true
          description: Applicability filter — null is a wildcard.
        activityCode:
          type: string
          nullable: true
        action:
          type: string
          nullable: true
        resourceType:
          type: string
          nullable: true
        dslVersion:
          type: integer
          description: Defaults to the current DSL version (1). A value newer than supported is rejected.
        priority:
          type: integer
          description: Lower evaluates first (deterministic). Defaults to 100.
        conditions:
          $ref: "#/components/schemas/AbacDslPolicyConditions"
        isActive:
          type: boolean
          description: On create only — author enabled immediately. Defaults to false (author, then enable).
    AbacPolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        policyCode:
          type: string
        effect:
          type: string
          enum:
            - allow
            - deny
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
    AbacSimulationRequest:
      type: object
      required:
        - request
      properties:
        subject:
          type: object
          properties:
            tenantUserId:
              type: string
              format: uuid
              nullable: true
              description: Simulate an EXISTING tenant user (resolves their real roles). Different from the caller requires identity_access.access_control.read.
            roles:
              type: array
              items:
                type: string
              description: Simulate a hypothetical role-code set instead of an existing user.
        request:
          type: object
          required:
            - moduleKey
            - activityCode
            - action
          properties:
            moduleKey:
              type: string
            activityCode:
              type: string
            action:
              type: string
            resourceType:
              type: string
              nullable: true
            resourceAttributes:
              type: object
              additionalProperties: true
              description: Hypothetical resource attributes (treated as server-verified).
        environment:
          type: object
          properties:
            ipTrusted:
              type: boolean
            now:
              type: string
              format: date-time
              nullable: true
    AbacSimulationResponse:
      type: object
      properties:
        decision:
          type: object
          properties:
            allowed:
              type: boolean
            reason:
              type: string
            matchedPolicy:
              type: string
              nullable: true
            matchedPolicyVersion:
              type: integer
              nullable: true
        evaluatedPolicies:
          type: array
          description: Per-policy structural trace — booleans only, never attribute VALUES (no PII).
          items:
            type: object
            properties:
              policyCode:
                type: string
              effect:
                type: string
                enum:
                  - allow
                  - deny
              dslVersion:
                type: integer
              priority:
                type: integer
              applicable:
                type: boolean
              conditionSatisfied:
                type: boolean
                nullable: true
              invalid:
                type: boolean
        subject:
          type: object
          properties:
            tenantUserId:
              type: string
            roles:
              type: array
              items:
                type: string
    AccessEvaluateRequest:
      type: object
      required:
        - moduleKey
        - activityCode
        - action
      properties:
        moduleKey:
          type: string
        activityCode:
          type: string
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
          format: uuid
        resourceAttributes:
          type: object
          additionalProperties: true
    AccessEvaluateResponse:
      type: object
      properties:
        allowed:
          type: boolean
        reason:
          type: string
        matchedPolicy:
          type: string
          nullable: true
        matchedPolicyVersion:
          type: integer
          nullable: true
    AdPlacementCreateRequest:
