          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createBusinessScopeAssignment
      tags:
        - Identity & Access
      summary: Create a business-scope assignment (high-risk, audited, idempotent).
      description: Grants a subject a role/permission context restricted to one business scope. The `(scopeType, scopeId)` reference is validated server-side through the `BusinessScopeHierarchyPort` capability (never trusted from the request alone); an unresolved scope is denied `SCOPE_UNRESOLVED`. Self-grant is denied. Gated on `identity_access.business_scope_assignments.create`. Requires `Idempotency-Key`.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tenantUserId
                - scopeType
                - scopeId
              properties:
                tenantUserId:
                  type: string
                  format: uuid
                roleId:
                  type: string
                  format: uuid
                  nullable: true
                scopeType:
                  type: string
                  description: Lowercase snake_case scope type (e.g. "office").
                scopeId:
                  type: string
                  format: uuid
                effectiveFrom:
                  type: string
                  format: date-time
                effectiveTo:
                  type: string
                  format: date-time
                  nullable: true
                isTemporary:
                  type: boolean
                reason:
                  type: string
                  nullable: true
      responses:
        "200":
          description: The created business-scope assignment.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      assignment:
                        $ref: "#/components/schemas/BusinessScopeAssignment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The Idempotency-Key was already used with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
