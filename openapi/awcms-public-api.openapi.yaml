                      token:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Too many login attempts from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
