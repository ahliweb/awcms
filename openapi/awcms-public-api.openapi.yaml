  /api/v1/auth/login:
    post:
      operationId: postAuthLogin
      tags:
        - Identity & Access
      summary: Authenticate with a login identifier and password; issues a session token.
      security: []
      parameters:
        - name: X-AWCMS-Tenant-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
