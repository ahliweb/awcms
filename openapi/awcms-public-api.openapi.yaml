        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workflowKey
                - name
                - graph
              properties:
                workflowKey:
                  type: string
                name:
                  type: string
                description:
                  type: string
                graph:
                  type: object
                factsSchema:
                  type: array
                  items:
                    type: object
      responses:
        "200":
          description: Draft definition created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
