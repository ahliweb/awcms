          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict is already resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/BadRequest"
  /api/v1/sync/nodes:
    get:
      operationId: syncListNodes
      tags:
        - Sync Storage
      summary: List sync nodes for the tenant (bearer session or SSR cookie, not HMAC).
      description: Admin-facing view of node registrations — distinct from the machine-to-machine HMAC endpoints (/sync/push, /sync/pull, /sync/status, /sync/objects*).
      responses:
        "200":
          description: All sync nodes registered for the tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      nodes:
                        type: array
                        items:
                          type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/sync/nodes/{id}:
    patch:
      operationId: syncUpdateNode
      tags:
        - Sync Storage
      summary: Activate/deactivate or rename a sync node (audited).
      description: "Deactivating a node takes effect immediately: every HMAC sync endpoint already rejects a non-active node with 403."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - active
                    - inactive
                nodeName:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Sync node updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/BadRequest"
  /api/v1/sync/object-queue:
    get:
      operationId: syncListObjectQueue
      tags:
        - Sync Storage
      summary: List object sync queue entries tenant-wide (bearer session, not HMAC).
      description: Admin-facing, all-nodes view — distinct from the node-scoped HMAC GET /sync/objects/status.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - sent
              - failed
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Object sync queue entries tenant-wide (limit 200), newest first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      objects:
                        type: array
                        items:
                          type: object
                      nextCursor:
                        type: string
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/sync/object-queue/{id}/retry:
    post:
      operationId: syncRetryObjectQueueEntry
      tags:
        - Sync Storage
      summary: Manually retry a failed object sync queue entry (audited).
      description: Human override of the automatic exponential-backoff schedule. Only `failed` entries are eligible; `pending`/`sent` are rejected with 409.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Entry reset to pending.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Only failed entries can be retried.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/sync/objects:
    post:
      operationId: syncEnqueueObjects
      tags:
        - Sync Storage
      summary: Enqueue local objects for object-storage sync (upsert by objectKey, HMAC-authenticated).
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - objects
              properties:
                objects:
                  type: array
                  items:
                    type: object
                    required:
                      - objectKey
                      - localPath
                      - checksumSha256
                      - byteSize
                    properties:
                      objectKey:
                        type: string
                      localPath:
                        type: string
                      checksumSha256:
                        type: string
                        pattern: ^[a-f0-9]{64}$
                      byteSize:
                        type: integer
                        minimum: 0
      responses:
        "200":
          description: Objects queued (re-enqueuing an existing objectKey upserts it back to pending).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      queued:
                        type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/BadRequest"
  /api/v1/sync/objects/status:
    get:
      operationId: syncGetObjectsStatus
      tags:
        - Sync Storage
      summary: List this node's pending/failed object sync queue entries (HMAC-authenticated).
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
      responses:
        "200":
          description: Non-sent object sync queue entries for this node (limit 100), oldest first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      objects:
                        type: array
                        items:
                          type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/sync/pull:
    post:
      operationId: syncPull
      tags:
        - Sync Storage
      summary: Pull events newer than the node's stored checkpoint (HMAC-authenticated).
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
      responses:
        "200":
          description: Events since the node's last checkpoint, and the new checkpoint.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      events:
                        type: array
                        items:
                          type: object
                      checkpoint:
                        type: integer
                      hasMore:
                        type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/BadRequest"
  /api/v1/sync/push:
    post:
      operationId: syncPush
      tags:
        - Sync Storage
      summary: Push a batch of local events to the server (idempotent per batchId, HMAC-authenticated).
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - batchId
                - events
              properties:
                batchId:
                  type: string
                events:
                  type: array
                  items:
                    type: object
                    required:
                      - eventType
                      - aggregateType
                      - payload
                    properties:
                      eventType:
                        type: string
                      aggregateType:
                        type: string
                      aggregateId:
                        type: string
                        format: uuid
                      baseVersion:
                        type: integer
                        minimum: 0
                      payload: {}
      responses:
        "200":
          description: Batch accepted (or already applied, if the batchId was seen before).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      batchId:
                        type: string
                      accepted:
                        type: integer
                      conflicted:
                        type: integer
                      duplicate:
                        type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/BadRequest"
  /api/v1/sync/status:
    get:
      operationId: syncGetStatus
      tags:
        - Sync Storage
      summary: Get the calling node's sync status (HMAC-authenticated).
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
      responses:
        "200":
          description: Sync node status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/tenant/domains:
    get:
      tags:
        - Tenant Domains
      summary: List this tenant's domain/subdomain mappings
      description: Gated by tenant_domain.domains.read. Non-deleted mappings only, keyset-paginated newest first (limit 100).
      operationId: tenantDomainsList
      parameters:
        - name: cursor
          in: query
          required: false
          description: Opaque keyset cursor from a previous page's `nextCursor`.
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: A page of tenant domain mappings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      domains:
                        type: array
                        items:
                          $ref: "#/components/schemas/TenantDomain"
                      nextCursor:
                        type: string
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Tenant Domains
      summary: Add a tenant domain/subdomain mapping
      description: Gated by tenant_domain.domains.create. A duplicate normalized hostname always returns a generic 409 (never reveals whether the hostname belongs to another tenant). Audited.
      operationId: tenantDomainsCreate
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantDomainRequest"
      responses:
        "200":
          description: Mapping created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/TenantDomain"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: The hostname is already mapped to a tenant (HOSTNAME_CONFLICT).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/tenant/domains/{id}:
    get:
      tags:
        - Tenant Domains
      summary: Read one tenant domain mapping
      description: Gated by tenant_domain.domains.read. Unknown/cross-tenant/soft-deleted id all return a generic 404.
      operationId: tenantDomainsGet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: The tenant domain mapping.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/TenantDomain"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Tenant Domains
      summary: Partially update a tenant domain mapping
      description: Gated by tenant_domain.domains.update. Idempotent by construction. `hostname`/`is_primary` are immutable here and `status` can never be set to `active` (use POST .../verify). Audited.
      operationId: tenantDomainsUpdate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantDomainRequest"
      responses:
        "200":
          description: Mapping updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/TenantDomain"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Tenant Domains
      summary: Soft-delete a tenant domain mapping
      description: Gated by tenant_domain.domains.delete. Reason-required soft delete; never hard-deletes, and frees the normalized hostname for reuse. Audited.
      operationId: tenantDomainsDelete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteTenantDomainRequest"
      responses:
        "200":
          description: Mapping soft-deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      deleted:
                        type: boolean
                        enum:
                          - true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/tenant/domains/{id}/set-primary:
    post:
      tags:
        - Tenant Domains
      summary: Set a tenant domain as the active primary
      description: Gated by tenant_domain.domains.set_primary. Requires Idempotency-Key. Atomically makes the domain this tenant's single primary, unsetting any previous primary. Only an `active` (verified) domain is eligible. Audited.
      operationId: tenantDomainsSetPrimary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Domain set as primary, or replay of a prior identical request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/TenantDomain"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Domain is not `active` (INVALID_STATUS_TRANSITION), a concurrent request already changed the primary (CONCURRENT_UPDATE), or the Idempotency-Key was reused with a different request (IDEMPOTENCY_CONFLICT).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/tenant/domains/{id}/verify:
    post:
      tags:
        - Tenant Domains
      summary: Verify a tenant domain (manual-first)
      description: "Gated by tenant_domain.domains.verify. Requires Idempotency-Key. Manual-first: flips status to `active` based on the row's own `verification_method`/`verification_record_*` — no outbound DNS/HTTP call. Audited."
      operationId: tenantDomainsVerify
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Domain verified (status `active`), or replay of a prior identical request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/TenantDomain"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot verify from the current status (INVALID_STATUS_TRANSITION), or the Idempotency-Key was reused with a different request (IDEMPOTENCY_CONFLICT).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/tenant/modules:
    get:
      operationId: listTenantModules
