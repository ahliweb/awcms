    put:
      tags:
        - Workflow Approval
      operationId: workflowsUpdateDefinition
      summary: Update a draft workflow definition in place.
      description: 409 if the definition is not a draft (fork a new version via POST /new-version instead).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                graph:
                  type: object
                factsSchema:
                  type: array
                  items:
                    type: object
      responses:
        "200":
          description: Draft definition updated.
          content:
            application/json:
              schema:
