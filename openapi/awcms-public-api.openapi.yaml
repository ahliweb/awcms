        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Delivery not dead-lettered, or consumer no longer supports the event schema.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "413": { $ref: "#/components/responses/BadRequest" }
  /api/v1/sync/push:
    post:
      operationId: syncPush
      tags: [Sync Storage]
      summary: Push a batch of local events to the server (idempotent per batchId, HMAC-authenticated).
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batchId, events]
              properties:
                batchId: { type: string }
                events:
                  type: array
                  items:
                    type: object
                    required: [eventType, aggregateType, payload]
                    properties:
                      eventType: { type: string }
                      aggregateType: { type: string }
                      aggregateId: { type: string, format: uuid }
                      baseVersion: { type: integer, minimum: 0 }
                      payload: {}
      responses:
        "200":
          description: Batch accepted (or already applied, if the batchId was seen before).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      batchId: { type: string }
                      accepted: { type: integer }
                      conflicted: { type: integer }
                      duplicate: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "413": { $ref: "#/components/responses/BadRequest" }
  /api/v1/sync/pull:
    post:
      operationId: syncPull
      tags: [Sync Storage]
      summary: Pull events newer than the node's stored checkpoint (HMAC-authenticated).
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit: { type: integer, minimum: 1, maximum: 500 }
      responses:
        "200":
          description: Events since the node's last checkpoint, and the new checkpoint.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      events: { type: array, items: { type: object } }
                      checkpoint: { type: integer }
                      hasMore: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "413": { $ref: "#/components/responses/BadRequest" }
  /api/v1/sync/status:
    get:
      operationId: syncGetStatus
      tags: [Sync Storage]
      summary: Get the calling node's sync status (HMAC-authenticated).
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
      responses:
        "200":
          description: Sync node status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/sync/objects:
    post:
      operationId: syncEnqueueObjects
      tags: [Sync Storage]
      summary: Enqueue local objects for object-storage sync (upsert by objectKey, HMAC-authenticated).
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [objects]
              properties:
                objects:
                  type: array
                  items:
                    type: object
                    required: [objectKey, localPath, checksumSha256, byteSize]
                    properties:
                      objectKey: { type: string }
                      localPath: { type: string }
                      checksumSha256:
                        { type: string, pattern: "^[a-f0-9]{64}$" }
                      byteSize: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Objects queued (re-enqueuing an existing objectKey upserts it back to pending).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
