  /api/v1/email/announcements:
    post:
      tags: [Email]
      operationId: emailCreateAnnouncement
      summary: Enqueue a notification/announcement (idempotent, two-tier ABAC, audited).
      description: Requires Idempotency-Key. email.notification.create for every request; email.announcement.create additionally for role/tenant targets.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateKey: { type: string }
                variables: { type: object }
                target: { type: object }
                locale: { type: string }
      responses:
        "200":
          description: Recipients enqueued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      recipientCount: { type: integer }
                      truncated:
                        type: boolean
                        description: >-
                          True when more users matched the target than the
                          per-request recipient cap, so the remainder were NOT
                          enqueued. Callers must treat a truncated response as
                          a partial send and re-target the remainder.
                      correlationId: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /api/v1/email/announcements/preview:
    post:
      tags: [Email]
      operationId: emailPreviewAnnouncement
      summary: Dry-run announcement targeting — recipient count + synthetic sample only.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateKey: { type: string }
                variables: { type: object }
                target: { type: object }
                locale: { type: string }
      responses:
        "200":
          description: Preview (count + sample render).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      matchedCount:
                        type: integer
                        description: >-
                          Capped at the per-request recipient cap. Read together
                          with `truncated` — a capped preview under-reports the
                          real audience.
                      truncated:
                        type: boolean
                        description: >-
                          True when more users matched the target than the cap,
                          so `matchedCount` is the cap and not the real total.
                      sample: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
