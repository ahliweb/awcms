      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - Blog Content
      operationId: blogSubmitPostForReview
      summary: Submit a draft post for review
      description: Transitions draft -> review. Gated by blog_content.posts.update (same ownership carve-out as PATCH .../{id}). Not idempotency-keyed — the status transition is naturally idempotent.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Post submitted for review.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: "#/components/schemas/BlogPost"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The post's current status cannot transition to review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/blog/search:
    get:
      tags:
        - Blog Content
      operationId: blogSearchContent
      summary: Full-text search across posts and pages
      description: Gated by blog_content.search.read. May return content of any status per the caller's granted permission. Keyset-paginated (?cursor=).
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: resourceType
          in: query
          schema:
            type: string
            enum:
              - post
              - page
        - name: status
          in: query
          schema:
            type: string
            enum:
              - draft
              - review
              - scheduled
              - published
              - archived
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Matching results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                      nextCursor:
                        type: string
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
