    TenantUserMasked:
      type: object
      properties:
        id:
          type: string
          format: uuid
        loginIdentifierMasked:
          type: string
          description: Masked login identifier — PII is never returned raw in a list.
        status:
          type: string
        roles:
          type: array
          items:
            type: string
          description: Assigned role codes (empty when the user holds no role).
    ThemeConfigRequest:
      type: object
      description: A tenant's DATA-only theme configuration. Every key/value is validated against the chosen theme descriptor; unknown tokens/slots/assets/sections are rejected, and token values are validated by rejection against strict CSS grammars (no url()/expression()/@import/javascript:/comment-breakout).
      required:
        - themeKey
      properties:
        themeKey:
          type: string
          maxLength: 64
          description: A registered (build-time) theme key.
        tokenOverrides:
          type: object
          additionalProperties:
            type: string
          description: tokenKey -> validated token value (color/dimension/number, or a font-family allow-list key). Unknown token keys are rejected.
        slotSelections:
          type: object
          additionalProperties:
            type: string
          description: slotKey -> chosen variant key (from the slot's allow-list).
        assetRefs:
          type: object
          additionalProperties:
            type: string
            format: uuid
            nullable: true
          description: assetSlotKey -> media object UUID (never a URL); null clears the slot.
        sectionOrder:
          type: array
          items:
            type: string
          description: An ordering of the theme's declared content-section keys.
        navPlacement:
          type: string
          description: One of the theme's declared nav placements.
    ThemeDraft:
      type: object
      required:
        - versionId
        - themeKey
        - config
        - configHash
      properties:
        versionId:
          type: string
          format: uuid
        themeKey:
          type: string
        config:
          type: object
          description: The validated, normalized config as stored.
        configHash:
          type: string
    ThemeValidationResult:
      type: object
      required:
        - valid
        - errors
        - previewCss
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
              message:
                type: string
        previewCss:
          type: string
          nullable: true
          description: The `:root { … }` custom-property block that would be served, when valid; null when invalid.
    ThemeVersion:
      type: object
      required:
        - versionId
        - themeKey
        - versionNumber
      properties:
        versionId:
          type: string
          format: uuid
        themeKey:
          type: string
        versionNumber:
          type: integer
          nullable: true
        configHash:
          type: string
        publishedAt:
          type: string
          format: date-time
          nullable: true
    ThemingState:
      type: object
      required:
        - themes
        - state
        - draft
        - versions
      properties:
        themes:
          type: array
          description: Available reviewed, build-time theme descriptors.
          items:
            type: object
        state:
          type: object
          required:
            - activeThemeKey
            - activeVersionId
            - draftThemeKey
          properties:
            activeThemeKey:
              type: string
              nullable: true
            activeVersionId:
              type: string
              format: uuid
              nullable: true
            draftThemeKey:
              type: string
              nullable: true
        draft:
          type: object
          nullable: true
        versions:
          type: array
          items:
            $ref: "#/components/schemas/ThemeVersion"
    UpdateTenantDomainRequest:
