      summary: Create a direct-to-R2 presigned upload session for a news image
      description: Gated by media_library.media.create. Returns a `pending_upload` metadata row plus a short-lived presigned PUT URL scoped to exactly one server-generated object key. Raw R2 credentials are never exposed to the browser.
      operationId: newsMediaUploadSessionsCreate
