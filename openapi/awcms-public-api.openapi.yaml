                      - true
                  data:
                    type: object
                    properties:
                      postId:
                        type: string
                        format: uuid
                      enabled:
                        type: boolean
                      disabledReason:
                        type: string
                        nullable: true
                        enum:
                          - deployment_disabled
                          - tenant_disabled
                          - post_disabled
                          - null
                      matches:
                        type: array
                        items:
                          type: object
                      totalLinked:
                        type: integer
