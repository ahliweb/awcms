# AWCMS CI - PR Checks
# Runs on pull requests (supports forks)

name: CI (PR)

on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22.22.2'

permissions:
  contents: read

jobs:
  pr-governance:
    name: PR Governance
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR template sections
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 - <<'PY'
          import os
          import sys

          body = os.environ.get('PR_BODY') or ''
          required_sections = [
              '## Summary',
              '## Planning Record',
              '## Affected Surfaces',
              '## Security And Boundaries',
              '## OpenAPI And Docs',
              '## Verification',
              '## Review Focus',
          ]

          missing = [section for section in required_sections if section not in body]
          if missing:
              print('PR body is missing required sections:')
              for section in missing:
                  print(f' - {section}')
              print('\nUse .github/pull_request_template.md when opening or updating the PR.')
              sys.exit(1)

          print('PR governance template sections are present.')
          PY

  # ============================================
  # Lint & Test - Admin Panel
  # ============================================
  lint-test-admin:
    needs: pr-governance
    name: Lint & Test (Admin)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run ESLint
        run: npm run lint

      - name: Report unused exports / dead code (knip)
        run: npm run lint:unused
        continue-on-error: true

      - name: Run Tests
        # Skip tests that require secrets if running on fork? 
        # Or run them with mocks if your tests can handle it.
        # Assuming tests might fail without real env, we can skip or run with mock.
        # We will try running with mocks.
        run: npm run test -- --run
        env:
          VITE_SUPABASE_URL: "https://mock.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://mock.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"

  runtime-validation:
    needs: pr-governance
    name: Runtime Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install admin dependencies
        run: npm ci
        working-directory: ./awcms

      - name: Install shared dependencies
        run: npm ci
        working-directory: ./packages/awcms-shared

      - name: Install edge dependencies
        run: npm ci
        working-directory: ./awcms-edge

      - name: Run runtime validation
        run: bash ./scripts/ci-validate-runtime.sh
        env:
          VITE_SUPABASE_URL: "https://mock.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"

  # ============================================
  # Lint & Build - Public Portal (Astro)
  # ============================================
  lint-build-public:
    needs: pr-governance
    name: Lint & Build (Public Portal)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-public/primary

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-public/primary/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run checks
        run: npm run check
        env:
          PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"
          PUBLIC_TENANT_ID: "00000000-0000-0000-0000-000000000000"

      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"
          PUBLIC_TENANT_ID: "00000000-0000-0000-0000-000000000000"

  # ============================================
  # Flutter Build - Mobile App
  # ============================================
  build-mobile:
    needs: pr-governance
    name: Build (Mobile - Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-mobile/primary

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: cp .env.example .env

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # ============================================
  # Typecheck - Edge Worker
  # ============================================
  typecheck-edge:
    needs: pr-governance
    name: Typecheck (Edge Worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-edge

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-edge/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run typecheck
        run: npm run typecheck

      - name: Build OpenAPI artifacts
        run: npm run openapi:build

      - name: Validate OpenAPI boundaries
        run: npm run openapi:validate

      - name: Check OpenAPI artifact drift
        run: npm run openapi:diff

      - name: Run edge tests
        run: npm run test

  # ============================================
  # Lint & Build - MCP Server
  # ============================================
  lint-build-mcp:
    needs: pr-governance
    name: Lint & Build (MCP)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-mcp/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

  # ============================================
  # Build - External Extension Package
  # ============================================
  build-ext-primary-analytics:
    needs: pr-governance
    name: Build (Extension - Primary Analytics)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-ext/primary-analytics

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-ext/primary-analytics/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run CI build
        run: npm run build:ci

  # ============================================
  # Typecheck - Shared Package
  # ============================================
  typecheck-shared:
    needs: pr-governance
    name: Typecheck (@awcms/shared)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/awcms-shared

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './packages/awcms-shared/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  # ============================================
  # Lint & Build - SMANDAPBUN Portal (Astro)
  # ============================================
  lint-build-smandapbun:
    needs: pr-governance
    name: Lint & Build (Smandapbun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-public/smandapbun

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-public/smandapbun/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run checks
        run: npm run check && npm run lint
        env:
          PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"
          PUBLIC_TENANT_ID: "00000000-0000-0000-0000-000000000000"

      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"
          PUBLIC_TENANT_ID: "00000000-0000-0000-0000-000000000000"

  # ============================================
  # Database Migrations Check
  # ============================================
  db-check:
    needs: pr-governance
    name: Database Migrations Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate migration parity and history safety
        run: bash ./scripts/verify_supabase_migration_consistency.sh
