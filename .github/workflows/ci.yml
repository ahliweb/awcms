# CI AWCMS — kualitas dokumentasi, kontrak, unit/integration test, & hygiene
# (Bun-only).
#
# Setiap step di job `quality` dinamai sesuai, dan dijaga urutannya sama
# dengan, script `check` di package.json — script itu tetap satu-satunya
# sumber kebenaran; step di sini adalah cerminannya yang di-orkestrasi CI,
# bukan daftar independen yang bisa drift darinya. Diadaptasi dari
# awcms-mini (`.github/workflows/ci.yml`), dipangkas ke apa yang benar-benar
# ada di repo ini: belum ada docker-compose*.yml untuk divalidasi. Job
# `quality` sengaja menjalankan `bun test` TANPA service Postgres — jadi
# `DATABASE_URL` kosong dan keempat berkas
# `tests/integration/*.integration.test.ts` (lihat gerbang `integrationEnabled`
# di `tests/integration/harness.ts`) skip bersih di sini; test itu baru
# benar-benar jalan saat seorang developer menyalakan `DATABASE_URL` lokal,
# atau di job `integration-tests` di bawah yang menyalakan Postgres-nya
# sendiri untuk itu. Sejak Issue #166 ada job `e2e-smoke` (Playwright + Bun):
# 404 + login render tidak butuh DB, tapi alur admin ter-autentikasi butuh,
# jadi job-nya menyalakan service `postgres:18.4`, `db:migrate`, lalu men-seed
# satu tenant+owner lewat `POST /api/v1/setup/initialize` (bootstrap
# sungguhan, bukan seed SQL ad-hoc) dan mengoperkan kredensialnya ke spec via
# env.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality (lint + docs + contracts + typecheck + test + build)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run lint

      - name: Docs checks (mermaid, internal links, naming)
        run: bun run check:docs

      - name: Docs translation staleness check (ADR-0023)
        run: bun run check:docs:translation

      - name: API spec + route contract check (fragments + bundle freshness)
        run: bun run api:spec:check

      - name: API reference docs freshness check (Issue #182)
        run: bun run api:docs:check

      - name: Module dependency graph check
        run: bun run modules:dag:check

      - name: Module composition check (Issue #178)
        run: bun run modules:compose:check

      - name: Module composition inventory freshness check (Issue #178)
        run: bun run modules:composition:inventory:check

      - name: Extension seam check (Issue #178)
        run: bun run extension:check

      - name: Reporting projection registry check
        run: bun run reporting:projections:registry:check

      - name: SoD rule registry check (Issue #181)
        run: bun run identity-access:sod-registry:check

      - name: Family compatibility conformance check (Issue #183)
        run: bun run family:conformance:check

      - name: Logging redaction lint check
        run: bun run logging:lint:check

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Unit tests (bun test)
        run: bun test

      - name: Build Astro foundation
        run: bun run build

      # Diagnostik ringkas, hanya di-upload bila ada step di atas yang
      # gagal. Sengaja sempit (bukan seluruh workspace/node_modules) dan
      # log-only — logger terstruktur repo ini tidak pernah mencetak
      # DATABASE_URL/secret (lihat src/lib/logging), dan job ini tidak
      # memakai secret sungguhan sama sekali.
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-failure-diagnostics
          path: |
            dist/
            !dist/**/*.map
          retention-days: 5
          if-no-files-found: ignore

  e2e-smoke:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      POSTGRES_USER: awcms
      POSTGRES_PASSWORD: awcms_ci_password
      POSTGRES_DB: awcms
    # Ephemeral per-job Postgres, created + torn down by the runner for THIS
    # job only. Migrations run as this superuser and the app connects as it
    # too — E2E smoke proves the UI flow (login → session → SSR render), not
    # RLS enforcement (that is what the `integration-tests` job below proves,
    # run under a non-superuser role there).
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: awcms
          POSTGRES_PASSWORD: awcms_ci_password
          POSTGRES_DB: awcms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awcms -d awcms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Assemble DATABASE_URL for this job's Postgres
        run: echo "DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply migrations
        run: bun run db:migrate

      - name: Build Astro foundation
        run: bun run build

      - name: Install Playwright Chromium (with OS deps)
        run: bun run test:e2e:install

      # HOST=127.0.0.1 is load-bearing: @astrojs/node binds to `localhost` by
      # default, which on the CI runner resolves to IPv6 `::1` while the probe,
      # the seed curl, and Playwright hit IPv4 `127.0.0.1` — the server is up
      # but unreachable, and the probe times out. Pinning HOST (and matching
      # E2E_BASE_URL) forces every end onto the same IPv4 address.
      - name: Start server, seed a tenant via the setup wizard, run E2E
        env:
          HOST: 127.0.0.1
          PORT: "4321"
          E2E_BASE_URL: http://127.0.0.1:4321
          E2E_LOGIN_IDENTIFIER: e2e-owner@example.com
          E2E_PASSWORD: e2e-password-123
          E2E_OFFICE_CODE: HQ-E2E
        run: |
          bun ./dist/server/entry.mjs &
          APP_PID=$!
          cleanup() { kill "$APP_PID" 2>/dev/null || true; }
          trap cleanup EXIT

          # Wait until the catch-all 404 answers (server up).
          up=""
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:4321/__e2e_probe" || true)
            if [ "$code" = "404" ]; then up="yes"; break; fi
            sleep 1
          done
          if [ -z "$up" ]; then echo "::error::server never became ready on 127.0.0.1:4321"; exit 1; fi

          # Seed one tenant + owner + head office through the REAL bootstrap
          # (singleton — runs once against this fresh DB), then hand its
          # tenantId to the authenticated spec.
          seed=$(curl -s -X POST "http://127.0.0.1:4321/api/v1/setup/initialize" \
            -H "Content-Type: application/json" \
            -d "{\"tenantCode\":\"e2e\",\"tenantName\":\"E2E Tenant\",\"officeCode\":\"${E2E_OFFICE_CODE}\",\"officeName\":\"E2E Head Office\",\"ownerDisplayName\":\"E2E Owner\",\"ownerLoginIdentifier\":\"${E2E_LOGIN_IDENTIFIER}\",\"ownerPassword\":\"${E2E_PASSWORD}\"}")
          echo "setup response: $seed"
          tenant_id=$(echo "$seed" | jq -r '.data.tenantId // empty')
          if [ -z "$tenant_id" ]; then echo "::error::setup/initialize did not return a tenantId"; exit 1; fi
          export E2E_TENANT_ID="$tenant_id"

          bun run test:e2e

  integration-tests:
    name: Integration tests (RLS + DB role separation)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      POSTGRES_USER: awcms
      POSTGRES_PASSWORD: awcms_ci_password
      POSTGRES_DB: awcms
    # Own ephemeral per-job Postgres — a fresh throwaway instance, never
    # shared with `e2e-smoke`'s. `tests/integration/harness.ts` treats this
    # superuser DATABASE_URL purely as an admin channel: it builds its OWN
    # ephemeral database/roles on top of it and runs real migrations via
    # `bun scripts/db-migrate.ts` as a subprocess — nothing else needs to be
    # pre-migrated here for the DB-gated suites this job exists to run.
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: awcms
          POSTGRES_PASSWORD: awcms_ci_password
          POSTGRES_DB: awcms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awcms -d awcms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Assemble DATABASE_URL for this job's Postgres
        run: echo "DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply migrations against this job's Postgres
        # Needed for both steps below: world-2 harness tests (module-tenant-
        # lifecycle) resolve `getDatabaseClient()` to THIS same `DATABASE_URL`
        # and soft-skip if it isn't migrated, and the legacy ad-hoc suite
        # connects to it directly and expects `sql/` already applied.
        run: bun run db:migrate

      - name: Run DB-gated integration tests
        # Scoped to `tests/integration/` (the harness-based suite, purpose-built
        # for concurrent execution against ITS OWN ephemeral per-run database —
        # see `tests/integration/harness.ts`), not a bare `bun test`. The older,
        # independent `*-postgres.test.ts`/concurrency test files elsewhere under
        # `tests/` each open their own ad-hoc connection to the SAME `DATABASE_URL`
        # database and were never designed to run concurrently against a shared
        # DB in one `bun test` process — verified empirically: a bare `bun test`
        # here made 26 of them fail (data collisions/ordering), while all 4
        # harness-based integration files passed cleanly. They run in their own
        # step below instead, in a fresh `bun test` process of their own.
        run: bun test tests/integration/

      - name: Run DB-gated integration tests (legacy ad-hoc suite)
        # These 9 files each open their own ad-hoc `Bun.SQL(DATABASE_URL)`
        # connection to the SAME database this job's harness step just used,
        # and were designed to run together (that is release.yml's original,
        # pre-`tests/integration/` DB-gated suite) — but NOT concurrently with
        # the harness-based files above in one `bun test` process (see the
        # step above's comment). Listed explicitly rather than relying on a
        # bare `bun test` so this suite can't silently regrow the collision
        # by pulling in `tests/integration/` again.
        run: >-
          bun test
          tests/audit-log-purge.test.ts
          tests/family-conformance-db.test.ts
          tests/keyset-pagination-precision-postgres.test.ts
          tests/office-directory-postgres.test.ts
          tests/reporting-projection-rebuild-lock.test.ts
          tests/security-readiness-failclosed.test.ts
          tests/security-readiness-rls.test.ts
          tests/security-readiness-worker-setup-grants.test.ts
          tests/sync-hmac-versioned.test.ts
          tests/workflow-approval-concurrency.test.ts

  minimum-supported:
    # Issue #183 AC "CI menguji minimal versi current DAN minimum-supported":
    # the `quality` job pins the CURRENT Bun (1.3.14); this cell actually RUNS
    # the declared floor `engines.bun >=1.3.0` (Bun 1.3.0) so a regression that
    # only breaks on the floor can never ship green. Verified locally: Bun 1.3.0
    # runs this exact subset (install/typecheck/build/family-conformance) clean.
    # Astro/@astrojs/node/TS "minimum" == the current caret range, so no separate
    # cell is needed for them (see ADR-0032 §Konsekuensi). The family-conformance
    # gate itself asserts CI runs EXACTLY {current, minimum} Bun versions, so
    # deleting this job turns that gate RED.
    name: Minimum-supported versions (Bun 1.3.0 floor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun (minimum-supported floor)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.0"

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-min-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-min-${{ runner.os }}-

      - name: Install dependencies (frozen)
        run: bun install --frozen-lockfile

      - name: Typecheck on minimum Bun
        run: bun run typecheck

      - name: Build Astro SSR on minimum Bun
        run: bun run build

      - name: Family conformance on minimum Bun
        run: bun run family:conformance:check

  hygiene:
    name: Repo hygiene (Bun-only + no secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: No Node.js tooling in package scripts (Bun-only)
        run: |
          if grep -REn '"[^"]*":\s*"(npm|npx|pnpm|yarn|node) ' package.json; then
            echo "::error::package.json scripts harus Bun-only (lihat AGENTS.md aturan Bun-only)."
            exit 1
          fi
          echo "OK: tidak ada tooling Node.js di package scripts."

      - name: No committed .env / secret files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -v '\.env\.example$'; then
            echo "::error::Berkas .env tidak boleh di-commit."
            exit 1
          fi
          echo "OK: tidak ada berkas .env yang ter-track."
