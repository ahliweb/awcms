# CI AWCMS — kualitas dokumentasi, kontrak, unit test, & hygiene (Bun-only).
#
# Setiap step di job `quality` dinamai sesuai, dan dijaga urutannya sama
# dengan, script `check` di package.json — script itu tetap satu-satunya
# sumber kebenaran; step di sini adalah cerminannya yang di-orkestrasi CI,
# bukan daftar independen yang bisa drift darinya. Diadaptasi dari
# awcms-mini (`.github/workflows/ci.yml`), dipangkas ke apa yang benar-benar
# ada di repo ini: belum ada test integrasi yang butuh Postgres hidup (semua
# 174+ test adalah unit murni), dan belum ada docker-compose*.yml untuk
# divalidasi. Sejak Issue #166 ada job `e2e-smoke` (Playwright + Bun) —
# untuk sekarang hanya spec `not-found.e2e.ts` yang tidak butuh Postgres,
# jadi job-nya belum menyalakan service DB (akan ditambah begitu ada spec E2E
# yang butuh sesi/tenant ter-seed, mengikuti pola dua-fase awcms-mini).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality (lint + docs + contracts + typecheck + test + build)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run lint

      - name: Docs checks (mermaid, internal links, naming)
        run: bun run check:docs

      - name: Docs translation staleness check (ADR-0023)
        run: bun run check:docs:translation

      - name: API spec + route contract check
        run: bun run api:spec:check

      - name: Module dependency graph check
        run: bun run modules:dag:check

      - name: Logging redaction lint check
        run: bun run logging:lint:check

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Unit tests (bun test)
        run: bun test

      - name: Build Astro foundation
        run: bun run build

      # Diagnostik ringkas, hanya di-upload bila ada step di atas yang
      # gagal. Sengaja sempit (bukan seluruh workspace/node_modules) dan
      # log-only — logger terstruktur repo ini tidak pernah mencetak
      # DATABASE_URL/secret (lihat src/lib/logging), dan job ini tidak
      # memakai secret sungguhan sama sekali.
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-failure-diagnostics
          path: |
            dist/
            !dist/**/*.map
          retention-days: 5
          if-no-files-found: ignore

  e2e-smoke:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Astro foundation
        run: bun run build

      - name: Install Playwright Chromium (with OS deps)
        run: bun run test:e2e:install

      # The only E2E spec today (`not-found.e2e.ts`) exercises the catch-all
      # 404 route, which touches NO database — so the app boots against a
      # placeholder `DATABASE_URL` purely to satisfy the connection-string
      # requirement, never actually connecting. A spec that needs a seeded
      # session/tenant will require a real `services.postgres` + `db:migrate`
      # here first (awcms-mini's `e2e-smoke` job is the template to follow).
      # HOST=127.0.0.1 is load-bearing: @astrojs/node binds to `localhost`
      # by default, which on the CI runner resolves to IPv6 `::1` while the
      # curl probe and Playwright hit IPv4 `127.0.0.1` — the server is up but
      # unreachable, and the probe times out. Pinning HOST (and matching
      # E2E_BASE_URL) forces both ends onto the same IPv4 address.
      - name: Start the built server and run E2E
        env:
          HOST: 127.0.0.1
          PORT: "4321"
          DATABASE_URL: postgres://placeholder:placeholder@127.0.0.1:5999/placeholder
          E2E_BASE_URL: http://127.0.0.1:4321
        run: |
          bun ./dist/server/entry.mjs &
          APP_PID=$!
          # Wait until the catch-all 404 answers (server up); fail if it never does.
          up=""
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:4321/__e2e_probe" || true)
            if [ "$code" = "404" ]; then up="yes"; break; fi
            sleep 1
          done
          if [ -z "$up" ]; then echo "::error::server never became ready on 127.0.0.1:4321"; kill "$APP_PID" || true; exit 1; fi
          bun run test:e2e
          status=$?
          kill "$APP_PID" || true
          exit $status

  hygiene:
    name: Repo hygiene (Bun-only + no secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: No Node.js tooling in package scripts (Bun-only)
        run: |
          if grep -REn '"[^"]*":\s*"(npm|npx|pnpm|yarn|node) ' package.json; then
            echo "::error::package.json scripts harus Bun-only (lihat AGENTS.md aturan Bun-only)."
            exit 1
          fi
          echo "OK: tidak ada tooling Node.js di package scripts."

      - name: No committed .env / secret files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -v '\.env\.example$'; then
            echo "::error::Berkas .env tidak boleh di-commit."
            exit 1
          fi
          echo "OK: tidak ada berkas .env yang ter-track."
