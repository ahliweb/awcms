# AWCMS CI/CD Pipeline
# Runs on push to main and pull requests

name: CI/CD

on:
  push:
    branches: [main, develop]

env:
  NODE_VERSION: '22.12.0'

permissions:
  contents: read

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    outputs:
      admin: ${{ steps.filter.outputs.admin }}
      public: ${{ steps.filter.outputs.public }}
      mobile: ${{ steps.filter.outputs.mobile }}
      smandapbun: ${{ steps.filter.outputs.smandapbun }}
      edge: ${{ steps.filter.outputs.edge }}
      mcp: ${{ steps.filter.outputs.mcp }}
      ext: ${{ steps.filter.outputs.ext }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin:
              - 'awcms/**'
            public:
              - 'awcms-public/primary/**'
            mobile:
              - 'awcms-mobile/**'
            smandapbun:
              - 'awcms-public/smandapbun/**'
            edge:
              - 'awcms-edge/**'
            mcp:
              - 'awcms-mcp/**'
            ext:
              - 'awcms-ext/**'
            shared:
              - 'packages/awcms-shared/**'
            runtime:
              - 'awcms/**'
              - 'awcms-edge/**'
              - 'packages/awcms-shared/**'
              - 'supabase/migrations/**'
              - 'awcms/supabase/migrations/**'
              - 'scripts/ci-validate-runtime.sh'
              - 'scripts/verify_supabase_migration_consistency.sh'
              - 'docs/architecture/runtime-boundaries.md'

  # ============================================
  # Lint & Test - Admin Panel
  # ============================================
  lint-test-admin:
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.admin == 'true' }}
    name: Lint & Test (Admin)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Resolve admin app env from env or secrets
        id: admin-env
        env:
          SECRET_VITE_SUPABASE_URL: ${{ secrets['VITE_SUPABASE_URL'] }}
          SECRET_VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets['VITE_SUPABASE_PUBLISHABLE_KEY'] }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          candidates = [
              Path('awcms/.env.production'),
              Path('awcms/.env.remote'),
              Path('awcms/.env.local'),
              Path('awcms/.env'),
          ]

          values = {'url': '', 'key': '', 'url_source': '', 'key_source': ''}

          def parse_env(path):
              parsed = {}
              for raw in path.read_text(encoding='utf-8').splitlines():
                  line = raw.strip()
                  if not line or line.startswith('#') or '=' not in line:
                      continue
                  key, value = line.split('=', 1)
                  parsed[key.strip()] = value.strip().strip('"').strip("'")
              return parsed

          for candidate in candidates:
              if not candidate.exists():
                  continue
              parsed = parse_env(candidate)
              if not values['url']:
                  value = parsed.get('VITE_SUPABASE_URL', '').strip() or parsed.get('SUPABASE_URL', '').strip()
                  if value:
                      values['url'] = value
                      values['url_source'] = str(candidate)
              if not values['key']:
                  value = parsed.get('VITE_SUPABASE_PUBLISHABLE_KEY', '').strip() or parsed.get('VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY', '').strip()
                  if value:
                      values['key'] = value
                      values['key_source'] = str(candidate)

          if not values['url']:
              value = (os.environ.get('SECRET_VITE_SUPABASE_URL') or '').strip()
              if value:
                  values['url'] = value
                  values['url_source'] = 'github_secret'
          if not values['key']:
              value = (os.environ.get('SECRET_VITE_SUPABASE_PUBLISHABLE_KEY') or '').strip()
              if value:
                  values['key'] = value
                  values['key_source'] = 'github_secret'

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"vite_supabase_url={values['url']}\n")
              output.write(f"vite_supabase_key={values['key']}\n")
              output.write(f"url_source={values['url_source']}\n")
              output.write(f"key_source={values['key_source']}\n")

          for field in ('url', 'key'):
              if values[field]:
                  print(f"::add-mask::{values[field]}")
          PY

      - name: Show admin app env source
        run: |
          echo "VITE_SUPABASE_URL source: ${{ steps.admin-env.outputs.url_source || 'unresolved' }}"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY source: ${{ steps.admin-env.outputs.key_source || 'unresolved' }}"

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests
        run: npm run test -- --run
        env:
          VITE_SUPABASE_URL: ${{ steps.admin-env.outputs.vite_supabase_url }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ steps.admin-env.outputs.vite_supabase_key }}

  runtime-validation:
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.runtime == 'true' }}
    name: Runtime Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install admin dependencies
        run: npm ci
        working-directory: ./awcms

      - name: Install shared dependencies
        run: npm ci
        working-directory: ./packages/awcms-shared

      - name: Install edge dependencies
        run: npm ci
        working-directory: ./awcms-edge

      - name: Run runtime validation
        run: bash ./scripts/ci-validate-runtime.sh

      - name: Build
        run: npm run build
        working-directory: ./awcms
        env:
          VITE_SUPABASE_URL: ${{ secrets['VITE_SUPABASE_URL'] }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets['VITE_SUPABASE_PUBLISHABLE_KEY'] }}

  # ============================================
  # Lint & Build - Public Portal (Astro)
  # ============================================
  lint-build-public:
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.public == 'true' }}
    name: Lint & Build (Public Portal)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-public/primary

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-public/primary/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Resolve primary public env from env or secrets
        id: public-env
        env:
          SECRET_PUBLIC_SUPABASE_URL: ${{ secrets['VITE_SUPABASE_URL'] }}
          SECRET_PUBLIC_SUPABASE_KEY: ${{ secrets['VITE_SUPABASE_PUBLISHABLE_KEY'] }}
          SECRET_PUBLIC_TENANT_ID: ${{ secrets['PUBLIC_TENANT_ID'] }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          candidates = [
              Path('awcms-public/primary/.env.production'),
              Path('awcms-public/primary/.env.remote'),
              Path('awcms-public/primary/.env.local'),
              Path('awcms-public/primary/.env'),
              Path('awcms/.env.production'),
              Path('awcms/.env.remote'),
              Path('awcms/.env.local'),
              Path('awcms/.env'),
          ]

          values = {'url': '', 'key': '', 'tenant_id': '', 'url_source': '', 'key_source': '', 'tenant_source': ''}

          def parse_env(path):
              parsed = {}
              for raw in path.read_text(encoding='utf-8').splitlines():
                  line = raw.strip()
                  if not line or line.startswith('#') or '=' not in line:
                      continue
                  key, value = line.split('=', 1)
                  parsed[key.strip()] = value.strip().strip('"').strip("'")
              return parsed

          for candidate in candidates:
              if not candidate.exists():
                  continue
              parsed = parse_env(candidate)
              if not values['url']:
                  value = parsed.get('PUBLIC_SUPABASE_URL', '').strip() or parsed.get('VITE_SUPABASE_URL', '').strip()
                  if value:
                      values['url'] = value
                      values['url_source'] = str(candidate)
              if not values['key']:
                  value = parsed.get('PUBLIC_SUPABASE_PUBLISHABLE_KEY', '').strip() or parsed.get('VITE_SUPABASE_PUBLISHABLE_KEY', '').strip() or parsed.get('VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY', '').strip()
                  if value:
                      values['key'] = value
                      values['key_source'] = str(candidate)
              if not values['tenant_id']:
                  value = parsed.get('PUBLIC_TENANT_ID', '').strip()
                  if value:
                      values['tenant_id'] = value
                      values['tenant_source'] = str(candidate)

          if not values['url']:
              value = (os.environ.get('SECRET_PUBLIC_SUPABASE_URL') or '').strip()
              if value:
                  values['url'] = value
                  values['url_source'] = 'github_secret'
          if not values['key']:
              value = (os.environ.get('SECRET_PUBLIC_SUPABASE_KEY') or '').strip()
              if value:
                  values['key'] = value
                  values['key_source'] = 'github_secret'
          if not values['tenant_id']:
              value = (os.environ.get('SECRET_PUBLIC_TENANT_ID') or '').strip() or '00000000-0000-0000-0000-000000000000'
              if value:
                  values['tenant_id'] = value
                  values['tenant_source'] = 'github_secret_or_default'

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"public_supabase_url={values['url']}\n")
              output.write(f"public_supabase_key={values['key']}\n")
              output.write(f"public_tenant_id={values['tenant_id']}\n")
              output.write(f"url_source={values['url_source']}\n")
              output.write(f"key_source={values['key_source']}\n")
              output.write(f"tenant_source={values['tenant_source']}\n")

          for field in ('url', 'key', 'tenant_id'):
              if values[field]:
                  print(f"::add-mask::{values[field]}")
          PY

      - name: Show primary public env source
        run: |
          echo "PUBLIC_SUPABASE_URL source: ${{ steps.public-env.outputs.url_source || 'unresolved' }}"
          echo "PUBLIC_SUPABASE_PUBLISHABLE_KEY source: ${{ steps.public-env.outputs.key_source || 'unresolved' }}"
          echo "PUBLIC_TENANT_ID source: ${{ steps.public-env.outputs.tenant_source || 'unresolved' }}"

      - name: Run checks
        run: npm run check
        env:
          PUBLIC_SUPABASE_URL: ${{ steps.public-env.outputs.public_supabase_url }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.public-env.outputs.public_supabase_key }}
          PUBLIC_TENANT_ID: ${{ steps.public-env.outputs.public_tenant_id }}

      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ steps.public-env.outputs.public_supabase_url }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.public-env.outputs.public_supabase_key }}
          PUBLIC_TENANT_ID: ${{ steps.public-env.outputs.public_tenant_id }}

  # ============================================
  # Flutter Build - Mobile App
  # ============================================
  build-mobile:
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.mobile == 'true' }}
    name: Build (Mobile - Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-mobile/primary

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: cp .env.example .env

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # ============================================
  # Typecheck - Edge Worker
  # ============================================
  typecheck-edge:
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.edge == 'true' }}
    name: Typecheck (Edge Worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-edge

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-edge/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run typecheck
        run: npm run typecheck

  # ============================================
  # Lint & Build - MCP Server
  # ============================================
  lint-build-mcp:
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.mcp == 'true' }}
    name: Lint & Build (MCP)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-mcp/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

  # ============================================
  # Build - External Extension Package
  # ============================================
  build-ext-primary-analytics:
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.ext == 'true' }}
    name: Build (Extension - Primary Analytics)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-ext/primary-analytics

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-ext/primary-analytics/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run CI build
        run: npm run build:ci

  # ============================================
  # Typecheck - Shared Package
  # ============================================
  typecheck-shared:
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.shared == 'true' }}
    name: Typecheck (@awcms/shared)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/awcms-shared

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './packages/awcms-shared/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  # ============================================
  # Deploy to Cloudflare Pages (Production)
  # ============================================
  deploy-production:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [paths-filter, lint-test-admin, lint-build-public]
    # Only deploy when on main branch
    if: ${{ github.ref == 'refs/heads/main' && vars['CLOUDFLARE_ENABLED'] == 'true' && needs.paths-filter.outputs.admin == 'true' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Admin Panel
        working-directory: ./awcms
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets['VITE_SUPABASE_URL'] }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets['VITE_SUPABASE_PUBLISHABLE_KEY'] }}

      - name: Resolve Cloudflare credentials from env or secrets
        id: cloudflare-env
        env:
          SECRET_CF_API_TOKEN: ${{ secrets['CLOUDFLARE_API_TOKEN'] }}
          SECRET_CF_ACCOUNT_ID: ${{ secrets['CLOUDFLARE_ACCOUNT_ID'] }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          candidates = [
              Path('awcms/.env.production'),
              Path('awcms/.env.remote'),
              Path('awcms/.env.local'),
              Path('awcms/.env'),
          ]

          values = {
              'token': '',
              'account_id': '',
              'token_source': '',
              'account_source': '',
          }

          def parse_env(path):
              parsed = {}
              for raw in path.read_text(encoding='utf-8').splitlines():
                  line = raw.strip()
                  if not line or line.startswith('#') or '=' not in line:
                      continue
                  key, value = line.split('=', 1)
                  parsed[key.strip()] = value.strip().strip('"').strip("'")
              return parsed

          for candidate in candidates:
              if not candidate.exists():
                  continue
              parsed = parse_env(candidate)
              if not values['token']:
                  token = parsed.get('CLOUDFLARE_API_TOKEN', '').strip()
                  if token:
                      values['token'] = token
                      values['token_source'] = str(candidate)
              if not values['account_id']:
                  account_id = parsed.get('CLOUDFLARE_ACCOUNT_ID', '').strip() or parsed.get('R2_ACCOUNT_ID', '').strip()
                  if account_id:
                      values['account_id'] = account_id
                      values['account_source'] = str(candidate)
              if not values['account_id']:
                  endpoint = parsed.get('R2_S3_API_ENDPOINT', '').strip()
                  match = re.search(r'https://([a-f0-9]{32})\.', endpoint)
                  if match:
                      values['account_id'] = match.group(1)
                      values['account_source'] = f'{candidate} (derived from R2_S3_API_ENDPOINT)'

          if not values['token']:
              secret_token = (os.environ.get('SECRET_CF_API_TOKEN') or '').strip()
              if secret_token:
                  values['token'] = secret_token
                  values['token_source'] = 'github_secret'

          if not values['account_id']:
              secret_account_id = (os.environ.get('SECRET_CF_ACCOUNT_ID') or '').strip()
              if secret_account_id:
                  values['account_id'] = secret_account_id
                  values['account_source'] = 'github_secret'

          if not values['account_id']:
              raise SystemExit(
                  'CLOUDFLARE_ACCOUNT_ID could not be resolved from env files or the CLOUDFLARE_ACCOUNT_ID secret. '
                  'Please set the CLOUDFLARE_ACCOUNT_ID GitHub Actions secret for this repository.'
              )

          output_path = os.environ['GITHUB_OUTPUT']
          with open(output_path, 'a', encoding='utf-8') as output:
              output.write(f"api_token={values['token']}\n")
              output.write(f"account_id={values['account_id']}\n")
              output.write(f"token_source={values['token_source']}\n")
              output.write(f"account_source={values['account_source']}\n")

          if values['token']:
              print(f"::add-mask::{values['token']}")
          if values['account_id']:
              print(f"Resolved Cloudflare account id: {values['account_id']}")
          else:
              print('Cloudflare account id not resolved from env files or secrets.')
          PY

      - name: Show Cloudflare credential source
        run: |
          echo "Cloudflare token source: ${{ steps.cloudflare-env.outputs.token_source || 'unresolved' }}"
          echo "Cloudflare account source: ${{ steps.cloudflare-env.outputs.account_source || 'unresolved' }}"

      - name: Validate Cloudflare deploy credentials
        id: cloudflare-preflight
        env:
          CF_API_TOKEN: ${{ steps.cloudflare-env.outputs.api_token }}
          CF_ACCOUNT_ID: ${{ steps.cloudflare-env.outputs.account_id }}
          CF_PAGES_PROJECT: awcms-admin
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ.get('CF_API_TOKEN', '').strip()
          account_id = os.environ.get('CF_ACCOUNT_ID', '').strip()
          project_name = os.environ.get('CF_PAGES_PROJECT', '').strip()

          missing = []
          if not token:
              missing.append('CLOUDFLARE_API_TOKEN')
          if not project_name:
              missing.append('CF_PAGES_PROJECT')

          if missing:
              raise SystemExit(
                  'Missing required Cloudflare deploy settings: ' + ', '.join(missing)
              )

          def request_json(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Content-Type': 'application/json',
                  },
              )
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read().decode('utf-8'))

          try:
              memberships = request_json('https://api.cloudflare.com/client/v4/memberships')
          except urllib.error.HTTPError as error:
              body = error.read().decode('utf-8', errors='ignore')
              raise SystemExit(
                  'Cloudflare token validation failed while calling /memberships. '
                  'Confirm the token is valid and has at least Account Settings:Read and Cloudflare Pages:Edit permissions. '
                  f'Response: {error.code} {body}'
              )

          if not memberships.get('success'):
              raise SystemExit(
                  'Cloudflare memberships lookup failed: ' + json.dumps(memberships.get('errors') or memberships)
              )

          allowed_accounts = {
              item.get('account', {}).get('id')
              for item in memberships.get('result') or []
              if item.get('account', {}).get('id')
          }

          if not allowed_accounts:
              raise SystemExit('The provided token does not have access to any Cloudflare accounts.')

          if not account_id:
              if len(allowed_accounts) == 1:
                  account_id = next(iter(allowed_accounts))
              else:
                  raise SystemExit(
                      'CLOUDFLARE_ACCOUNT_ID is not set and the token can access multiple accounts. '
                      f'Please set CLOUDFLARE_ACCOUNT_ID explicitly. Token can access: {sorted(allowed_accounts)}'
                  )

          if account_id not in allowed_accounts:
              raise SystemExit(
                  'Configured Cloudflare account is not accessible by the provided token. '
                  f'Expected {account_id}, token can access: {sorted(allowed_accounts)}'
              )

          try:
              project = request_json(
                  f'https://api.cloudflare.com/client/v4/accounts/{account_id}/pages/projects/{project_name}'
              )
          except urllib.error.HTTPError as error:
              body = error.read().decode('utf-8', errors='ignore')
              raise SystemExit(
                  'Cloudflare Pages project validation failed. '
                  'Confirm the token has Cloudflare Pages:Edit permission and the project name/account ID are correct. '
                  f'Response: {error.code} {body}'
              )

          if not project.get('success'):
              raise SystemExit(
                  'Cloudflare Pages project lookup failed: ' + json.dumps(project.get('errors') or project)
              )

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'account_id={account_id}\n')

          print(f'Cloudflare deploy preflight passed for project {project_name} in account {account_id}.')
          PY

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cloudflare-env.outputs.api_token }}
        with:
          apiToken: ${{ steps.cloudflare-env.outputs.api_token }}
          accountId: ${{ steps.cloudflare-preflight.outputs.account_id }}
          command: pages deploy awcms/dist --project-name=awcms-admin
          packageManager: npm
          wranglerVersion: '4.73.0'

  # ============================================
  # Lint & Build - SMANDAPBUN Portal (Astro)
  # ============================================
  lint-build-smandapbun:
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.smandapbun == 'true' }}
    name: Lint & Build (Smandapbun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-public/smandapbun

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-public/smandapbun/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Resolve smandapbun public env from env or secrets
        id: smandapbun-env
        env:
          SECRET_PUBLIC_SUPABASE_URL: ${{ secrets['SMANDAPBUN_SUPABASE_URL'] }}
          SECRET_PUBLIC_SUPABASE_KEY: ${{ secrets['SMANDAPBUN_SUPABASE_KEY'] }}
          SECRET_PUBLIC_TENANT_ID: ${{ secrets['SMANDAPBUN_TENANT_ID'] }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          candidates = [
              Path('awcms-public/smandapbun/.env.production'),
              Path('awcms-public/smandapbun/.env.remote'),
              Path('awcms-public/smandapbun/.env.local'),
              Path('awcms-public/smandapbun/.env'),
              Path('awcms/.env.production'),
              Path('awcms/.env.remote'),
              Path('awcms/.env.local'),
              Path('awcms/.env'),
          ]

          values = {
              'url': '',
              'key': '',
              'tenant_id': '',
              'url_source': '',
              'key_source': '',
              'tenant_source': '',
          }

          def parse_env(path):
              parsed = {}
              for raw in path.read_text(encoding='utf-8').splitlines():
                  line = raw.strip()
                  if not line or line.startswith('#') or '=' not in line:
                      continue
                  key, value = line.split('=', 1)
                  parsed[key.strip()] = value.strip().strip('"').strip("'")
              return parsed

          for candidate in candidates:
              if not candidate.exists():
                  continue
              parsed = parse_env(candidate)
              if not values['url']:
                  value = parsed.get('PUBLIC_SUPABASE_URL', '').strip() or parsed.get('VITE_SUPABASE_URL', '').strip()
                  if value:
                      values['url'] = value
                      values['url_source'] = str(candidate)
              if not values['key']:
                  value = parsed.get('PUBLIC_SUPABASE_PUBLISHABLE_KEY', '').strip() or parsed.get('VITE_SUPABASE_PUBLISHABLE_KEY', '').strip() or parsed.get('VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY', '').strip()
                  if value:
                      values['key'] = value
                      values['key_source'] = str(candidate)
              if not values['tenant_id']:
                  value = parsed.get('PUBLIC_TENANT_ID', '').strip()
                  if value:
                      values['tenant_id'] = value
                      values['tenant_source'] = str(candidate)

          if not values['url']:
              value = (os.environ.get('SECRET_PUBLIC_SUPABASE_URL') or '').strip()
              if value:
                  values['url'] = value
                  values['url_source'] = 'github_secret'
          if not values['key']:
              value = (os.environ.get('SECRET_PUBLIC_SUPABASE_KEY') or '').strip()
              if value:
                  values['key'] = value
                  values['key_source'] = 'github_secret'
          if not values['tenant_id']:
              value = (os.environ.get('SECRET_PUBLIC_TENANT_ID') or '').strip()
              if value:
                  values['tenant_id'] = value
                  values['tenant_source'] = 'github_secret'

          output_path = os.environ['GITHUB_OUTPUT']
          with open(output_path, 'a', encoding='utf-8') as output:
              output.write(f"public_supabase_url={values['url']}\n")
              output.write(f"public_supabase_key={values['key']}\n")
              output.write(f"public_tenant_id={values['tenant_id']}\n")
              output.write(f"url_source={values['url_source']}\n")
              output.write(f"key_source={values['key_source']}\n")
              output.write(f"tenant_source={values['tenant_source']}\n")

          for field, label in [('url', 'PUBLIC_SUPABASE_URL'), ('key', 'PUBLIC_SUPABASE_PUBLISHABLE_KEY'), ('tenant_id', 'PUBLIC_TENANT_ID')]:
              if values[field]:
                  print(f'::add-mask::{values[field]}')
              else:
                  print(f'{label} not resolved from env files or secrets.')
          PY

      - name: Show smandapbun public env source
        run: |
          echo "PUBLIC_SUPABASE_URL source: ${{ steps.smandapbun-env.outputs.url_source || 'unresolved' }}"
          echo "PUBLIC_SUPABASE_PUBLISHABLE_KEY source: ${{ steps.smandapbun-env.outputs.key_source || 'unresolved' }}"
          echo "PUBLIC_TENANT_ID source: ${{ steps.smandapbun-env.outputs.tenant_source || 'unresolved' }}"

      - name: Run checks
        run: npm run check && npm run lint
        env:
          PUBLIC_SUPABASE_URL: ${{ steps.smandapbun-env.outputs.public_supabase_url }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.smandapbun-env.outputs.public_supabase_key }}
          PUBLIC_TENANT_ID: ${{ steps.smandapbun-env.outputs.public_tenant_id }}

      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ steps.smandapbun-env.outputs.public_supabase_url }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.smandapbun-env.outputs.public_supabase_key }}
          PUBLIC_TENANT_ID: ${{ steps.smandapbun-env.outputs.public_tenant_id }}
