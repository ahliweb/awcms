name: Deploy Smandapbun

on:
  push:
    branches:
      - main
    paths:
      - 'awcms-public/smandapbun/**'
      - 'packages/awcms-shared/**'
      - '.github/workflows/deploy-smandapbun.yml'
  repository_dispatch:
    types:
      - smandapbun-content-changed
  workflow_dispatch:

env:
  NODE_VERSION: 22
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
  SMANDAPBUN_PAGES_PROJECT: awcms-smandapangkalanbun-web

jobs:
  deploy:
    name: Build and Deploy Smandapbun
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    defaults:
      run:
        working-directory: ./awcms-public/smandapbun

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./awcms-public/smandapbun/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check && npm run lint
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets['SMANDAPBUN_SUPABASE_URL'] }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets['SMANDAPBUN_SUPABASE_KEY'] }}
          PUBLIC_TENANT_ID: ${{ secrets['SMANDAPBUN_TENANT_ID'] }}

      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets['SMANDAPBUN_SUPABASE_URL'] }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets['SMANDAPBUN_SUPABASE_KEY'] }}
          PUBLIC_TENANT_ID: ${{ secrets['SMANDAPBUN_TENANT_ID'] }}

      - name: Validate Cloudflare deploy credentials
        id: cloudflare-preflight
        env:
          CF_API_TOKEN: ${{ secrets['CLOUDFLARE_API_TOKEN'] }}
          CF_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT: ${{ env.SMANDAPBUN_PAGES_PROJECT }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          token = os.environ.get('CF_API_TOKEN', '').strip()
          account_id = os.environ.get('CF_ACCOUNT_ID', '').strip()
          project_name = os.environ.get('CF_PAGES_PROJECT', '').strip()

          missing = []
          if not token:
              missing.append('CLOUDFLARE_API_TOKEN')
          if not project_name:
              missing.append('SMANDAPBUN_PAGES_PROJECT')

          if missing:
              raise SystemExit(
                  'Missing required Cloudflare deploy settings: ' + ', '.join(missing)
              )

          def request_json(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Content-Type': 'application/json',
                  },
              )
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read().decode('utf-8'))

          try:
              memberships = request_json('https://api.cloudflare.com/client/v4/memberships')
          except urllib.error.HTTPError as error:
              body = error.read().decode('utf-8', errors='ignore')
              raise SystemExit(
                  'Cloudflare token validation failed while calling /memberships. '
                  'Confirm the token is valid and has at least Account Settings:Read and Cloudflare Pages:Edit permissions. '
                  f'Response: {error.code} {body}'
              )

          if not memberships.get('success'):
              raise SystemExit(
                  'Cloudflare memberships lookup failed: ' + json.dumps(memberships.get('errors') or memberships)
              )

          allowed_accounts = {
              item.get('account', {}).get('id')
              for item in memberships.get('result') or []
              if item.get('account', {}).get('id')
          }

          if not allowed_accounts:
              raise SystemExit('The provided token does not have access to any Cloudflare accounts.')

          if not account_id:
              if len(allowed_accounts) == 1:
                  account_id = next(iter(allowed_accounts))
              else:
                  raise SystemExit(
                      'CLOUDFLARE_ACCOUNT_ID is not set and the token can access multiple accounts. '
                      f'Please set CLOUDFLARE_ACCOUNT_ID explicitly. Token can access: {sorted(allowed_accounts)}'
                  )

          if account_id not in allowed_accounts:
              raise SystemExit(
                  'Configured CLOUDFLARE_ACCOUNT_ID is not accessible by the provided token. '
                  f'Expected {account_id}, token can access: {sorted(allowed_accounts)}'
              )

          try:
              project = request_json(
                  f'https://api.cloudflare.com/client/v4/accounts/{account_id}/pages/projects/{project_name}'
              )
          except urllib.error.HTTPError as error:
              body = error.read().decode('utf-8', errors='ignore')
              raise SystemExit(
                  'Cloudflare Pages project validation failed. '
                  'Confirm the token has Cloudflare Pages:Edit permission and the project name/account ID are correct. '
                  f'Response: {error.code} {body}'
              )

          if not project.get('success'):
              raise SystemExit(
                  'Cloudflare Pages project lookup failed: ' + json.dumps(project.get('errors') or project)
              )

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'account_id={account_id}\n')

          print(f'Cloudflare deploy preflight passed for project {project_name} in account {account_id}.')
          PY

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets['CLOUDFLARE_API_TOKEN'] }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cloudflare-preflight.outputs.account_id }}
        with:
          apiToken: ${{ secrets['CLOUDFLARE_API_TOKEN'] }}
          accountId: ${{ steps.cloudflare-preflight.outputs.account_id }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=${{ env.SMANDAPBUN_PAGES_PROJECT }} --branch=main
          workingDirectory: awcms-public/smandapbun
          packageManager: npm
          wranglerVersion: '4.73.0'

      - name: Ensure production custom domains exist
        env:
          CF_API_TOKEN: ${{ secrets['CLOUDFLARE_API_TOKEN'] }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cloudflare-preflight.outputs.account_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          account_id = os.environ['CLOUDFLARE_ACCOUNT_ID']
          project_name = os.environ['SMANDAPBUN_PAGES_PROJECT']
          token = os.environ['CF_API_TOKEN']
          domains = ['sman2pangkalanbun.sch.id', 'www.sman2pangkalanbun.sch.id']

          for domain in domains:
              req = urllib.request.Request(
                  f'https://api.cloudflare.com/client/v4/accounts/{account_id}/pages/projects/{project_name}/domains',
                  data=json.dumps({'domain': domain}).encode('utf-8'),
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Content-Type': 'application/json',
                  },
                  method='POST',
              )

              try:
                  with urllib.request.urlopen(req) as response:
                      print(f'Ensured custom domain: {domain} ({response.status})')
              except urllib.error.HTTPError as error:
                  body = error.read().decode('utf-8', errors='ignore')
                  if error.code == 409 or 'already exists' in body.lower() or 'already been taken' in body.lower() or 'invalid tld' in body.lower():
                      print(f'Custom domain already configured or skipped (invalid TLD): {domain}')
                      continue
                  raise SystemExit(f'Failed to ensure custom domain {domain}: {error.code} {body}')
          PY

      - name: Deployment summary
        run: |
          echo "Deployed to ${{ steps.deploy.outputs.deployment-url }}"
          echo "Alias URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}"
